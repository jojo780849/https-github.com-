<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>生存割草 V11 - 深度Boss战</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden; background-color: #0a0a0a;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; min-height: -webkit-fill-available;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        html { height: -webkit-fill-available; }
        
        /* 游戏容器 - 竖版布局 */
        #game-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 450px; height: 100vh; height: 100dvh;
            position: relative;
        }
        
        /* 顶部 UI 区域 */
        #top-ui {
            width: 100%; padding: 8px 12px; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 4px; z-index: 10;
        }
        #top-row { display: flex; justify-content: space-between; align-items: center; }
        #stats { font-size: 14px; font-weight: bold; }
        #timer { font-size: 20px; font-weight: bold; color: #00e5ff; }
        #exp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #exp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00e5ff, #00ff88); transition: width 0.2s; }
        #weapons-display { font-size: 12px; color: #aaa; margin-top: 2px; }
        #active-talents { font-size: 11px; color: #888; }
        
        /* 游戏画布区域 */
        #canvas-wrapper {
            flex: 1; width: 100%; display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }
        canvas { background-color: #3d2a5c; width: 100%; height: 100%; display: block; }
        
        /* Boss 血条 */
        #boss-bar-container { 
            display: none; position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; text-align: center; z-index: 20;
        }
        #boss-name { font-size: 14px; color: #ff4444; margin-bottom: 3px; text-shadow: 0 0 10px #ff0000; transition: all 0.3s; }
        #boss-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 2px solid #ff4444; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        #boss-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff6600, #ffaa00); transition: width 0.3s; position: relative; }
        #boss-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent); }
        
        /* Boss 警告 */
        #boss-warning {
            display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 28px; color: #ff0000; text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000;
            animation: bossAppear 0.5s ease-out, blink 0.3s infinite 0.5s; z-index: 30;
            background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 10px;
            border: 2px solid #ff0000;
        }
        @keyframes bossAppear { from { transform: translate(-50%, -50%) scale(2); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes blink { 50% { opacity: 0.7; text-shadow: 0 0 50px #ff0000, 0 0 100px #ff0000; } }
        
        /* 波次提示 */
        #wave-notice {
            display: none; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; color: #ffaa00; text-shadow: 0 0 20px #ff6600;
            animation: fadeInOut 2s forwards; pointer-events: none; z-index: 30;
        }
        @keyframes fadeInOut { 0%,100% { opacity: 0; } 20%,80% { opacity: 1; } }
        
        /* 敌人统计 */
        #enemy-stats { 
            position: absolute; bottom: 5px; left: 10px; 
            font-size: 10px; opacity: 0.6; pointer-events: none; z-index: 20;
        }
        
        /* 底部控制区域 */
        #controls {
            width: 100%; height: 180px; min-height: 180px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            display: flex; justify-content: center; align-items: center;
            position: relative; padding: 10px;
        }
        
        /* 虚拟摇杆 */
        #joystick-container {
            width: 140px; height: 140px; position: relative;
        }
        #joystick-base {
            position: absolute; width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            border: 3px solid rgba(255,255,255,0.4); border-radius: 50%;
        }
        #joystick-stick {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(0,229,255,0.9) 0%, rgba(0,229,255,0.5) 100%);
            border: 3px solid rgba(0,229,255,1); border-radius: 50%;
            left: 40px; top: 40px; /* 居中 */
            box-shadow: 0 0 20px rgba(0,229,255,0.6);
        }
        
        #mobile-hint {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: rgba(255,255,255,0.4); pointer-events: none;
        }

        /* 升级菜单 */
        #levelup-menu {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 20px;
        }
        #levelup-menu h1 { color: #00e5ff; margin: 0 0 15px 0; font-size: 22px; }
        #cards-container { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; 
            max-width: 100%; overflow-y: auto; max-height: 70vh;
        }
        .card {
            background: #2a2a2a; padding: 12px; border-radius: 10px; cursor: pointer;
            transition: all 0.2s; border: 2px solid #444; width: calc(50% - 10px); max-width: 160px;
        }
        .card:active { background: #3a3a3a; border-color: #00e5ff; transform: scale(0.98); }
        .card h3 { margin: 0 0 5px 0; color: #ffd700; font-size: 14px; }
        .card .type { font-size: 10px; color: #888; margin-bottom: 3px; }
        .card p { font-size: 11px; margin: 0; color: #ccc; }
        .card-new { border-color: #ff6b00 !important; }
        .card-special { border-color: #ff00ff !important; background: linear-gradient(135deg, #2a2a2a, #3a2a3a) !important; }
        .card-special h3 { color: #ff66ff !important; }

        /* 开局天赋选择 */
        #talent-select {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; z-index: 100;
            padding: 20px; padding-top: max(20px, env(safe-area-inset-top));
            overflow-y: auto;
        }
        #talent-select h1 { color: #ffd700; margin-bottom: 5px; font-size: 26px; }
        #talent-select .subtitle { color: #888; margin-bottom: 15px; font-size: 13px; text-align: center; }
        #talent-cards { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; 
            width: 100%; max-width: 400px;
        }
        .talent-card {
            padding: 12px; background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 2px solid #444; border-radius: 12px; cursor: pointer; text-align: center;
            transition: all 0.2s;
        }
        .talent-card:active { transform: scale(0.98); }
        .talent-card.selected { border-color: #00e5ff; background: linear-gradient(135deg, #1a3a4a, #2a4a5a); }
        .talent-icon { font-size: 32px; margin-bottom: 5px; }
        .talent-name { font-size: 14px; font-weight: bold; color: #ffd700; margin-bottom: 3px; }
        .talent-desc { font-size: 11px; color: #aaa; }
        .talent-rarity { font-size: 9px; margin-top: 4px; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .rarity-common { background: #555; color: #ddd; }
        .rarity-rare { background: #1a4a8a; color: #66aaff; }
        .rarity-epic { background: #6a2a8a; color: #cc66ff; }
        .rarity-legendary { background: #8a4a00; color: #ffaa00; }
        #talent-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin-top: 15px; }
        #reroll-btn { padding: 12px; background: #333; border: 1px solid #555; color: #aaa; border-radius: 8px; cursor: pointer; font-size: 14px; }
        #start-btn { padding: 15px; background: linear-gradient(135deg, #00aa66, #00dd88); border: none; color: #fff; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #start-btn:disabled { background: #444; color: #666; }
        
        /* 桌面端样式 */
        @media (min-width: 500px) and (pointer: fine) {
            #game-container { max-width: 450px; border: 2px solid #333; }
            #controls { display: none; }
            body::after {
                content: '🎮 桌面端请使用 WASD 移动';
                position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
                font-size: 14px; color: #666;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 顶部 UI -->
        <div id="top-ui">
            <div id="top-row">
                <div id="stats">Lv.<span id="level">1</span> | 🗡️<span id="score">0</span> | ❤️<span id="hp">100</span></div>
                <div id="timer">00:00</div>
            </div>
            <div id="exp-bar-container"><div id="exp-bar"></div></div>
            <div id="weapons-display">武器: <span id="weapon-list">🔫弹射</span></div>
            <div id="active-talents"></div>
        </div>
        
        <!-- 游戏画布区域 -->
        <div id="canvas-wrapper">
            <canvas id="gameCanvas" width="450" height="600"></canvas>
            <div id="boss-bar-container">
                <div id="boss-name">⚠️ BOSS ⚠️</div>
                <div id="boss-bar-bg"><div id="boss-bar"></div></div>
            </div>
            <div id="boss-warning">⚠️ BOSS ⚠️</div>
            <div id="wave-notice"></div>
            <div id="enemy-stats"></div>
        </div>
        
        <!-- 底部控制区域 -->
        <div id="controls">
            <div id="joystick-container">
                <div id="joystick-base"></div>
                <div id="joystick-stick"></div>
            </div>
            <div id="mobile-hint">🕹️ 滑动摇杆移动 | 自动攻击</div>
        </div>
    </div>

    <!-- 开局天赋选择 -->
    <div id="talent-select">
        <h1>🎭 选择天赋</h1>
        <p class="subtitle">选择 1-3 个天赋开始游戏</p>
        <div id="talent-cards"></div>
        <div id="talent-buttons">
            <button id="reroll-btn">🎲 重新随机 (剩余 3 次)</button>
            <button id="start-btn" disabled>开始游戏</button>
        </div>
    </div>

    <!-- 升级菜单 -->
    <div id="levelup-menu">
        <h1>🎯 升级！选择能力</h1>
        <div id="cards-container"></div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const hpEl = document.getElementById('hp');
    const levelEl = document.getElementById('level');
    const expBar = document.getElementById('exp-bar');
    const levelUpMenu = document.getElementById('levelup-menu');
    const cardsContainer = document.getElementById('cards-container');
    const weaponListEl = document.getElementById('weapon-list');
    const timerEl = document.getElementById('timer');
    const bossBarContainer = document.getElementById('boss-bar-container');
    const bossBar = document.getElementById('boss-bar');
    const bossNameEl = document.getElementById('boss-name');
    const bossWarning = document.getElementById('boss-warning');
    const waveNotice = document.getElementById('wave-notice');
    const enemyStatsEl = document.getElementById('enemy-stats');
    const talentSelectEl = document.getElementById('talent-select');
    const talentCardsEl = document.getElementById('talent-cards');
    const rerollBtn = document.getElementById('reroll-btn');
    const startBtn = document.getElementById('start-btn');
    const activeTalentsEl = document.getElementById('active-talents');
    const joystickContainer = document.getElementById('joystick-container');
    const joystickStick = document.getElementById('joystick-stick');

    let score = 0;
    let frameCount = 0;
    let gameTime = 0; // 游戏时间（秒）
    let isGameOver = false;
    let isPaused = false;
    let currentBoss = null;
    let bossDefeated = 0;
    let rerollsLeft = 3;
    let selectedTalents = [];
    let activeTalents = []; // 当前生效的天赋

    // === 天赋系统定义 ===
    const allTalents = [
        // 🟢 普通天赋
        { id: 'swift', name: '疾风', icon: '💨', desc: '移速+30%', rarity: 'common', apply: () => { player.speed *= 1.3; } },
        { id: 'tough', name: '坚韧', icon: '🛡️', desc: '最大HP+50', rarity: 'common', apply: () => { player.maxHp += 50; player.hp += 50; hpEl.innerText = Math.floor(player.hp); } },
        { id: 'magnet', name: '磁力', icon: '🧲', desc: '拾取范围+100', rarity: 'common', apply: () => { player.pickupRange += 100; } },
        { id: 'lucky', name: '幸运儿', icon: '🍀', desc: '升级选项+1', rarity: 'common', apply: () => { player.upgradeChoices = 5; } },
        { id: 'bigshot', name: '大号弹药', icon: '🔮', desc: '子弹体积+50%', rarity: 'common', apply: () => { player.bulletSizeBonus = 1.5; } },
        
        // 🔵 稀有天赋
        { id: 'vampire', name: '吸血本能', icon: '🩸', desc: '击杀回复1HP', rarity: 'rare', apply: () => { player.lifestealOnKill = 1; } },
        { id: 'berserker', name: '狂战士', icon: '🔥', desc: 'HP越低伤害越高(最高+100%)', rarity: 'rare', apply: () => { player.berserker = true; } },
        { id: 'glass', name: '玻璃大炮', icon: '💎', desc: '伤害+50%，但最大HP-30', rarity: 'rare', apply: () => { player.damageBonus = 1.5; player.maxHp -= 30; player.hp = Math.min(player.hp, player.maxHp); hpEl.innerText = Math.floor(player.hp); } },
        { id: 'duelist', name: '决斗者', icon: '⚔️', desc: '对Boss伤害+80%', rarity: 'rare', apply: () => { player.bossDamageBonus = 1.8; } },
        { id: 'treasure', name: '寻宝者', icon: '💰', desc: '经验获取+50%', rarity: 'rare', apply: () => { player.expBonus = 1.5; } },
        { id: 'dodge', name: '幻影', icon: '👤', desc: '30%几率闪避伤害', rarity: 'rare', apply: () => { player.dodgeChance = 0.3; } },
        
        // 🟣 史诗天赋
        { id: 'orbital', name: '卫星启动', icon: '🛸', desc: '开局获得环绕护盾', rarity: 'epic', apply: () => { weapons.orbit.owned = true; weapons.orbit.level = 1; initOrbitals(); } },
        { id: 'summon', name: '灵魂契约', icon: '👻', desc: '开局获得幽灵召唤', rarity: 'epic', apply: () => { weapons.summon.owned = true; weapons.summon.level = 1; spawnSummon(); } },
        { id: 'explosive', name: '爆破专家', icon: '💥', desc: '开局获得爆裂魔法', rarity: 'epic', apply: () => { weapons.explosion.owned = true; weapons.explosion.level = 1; } },
        { id: 'giant', name: '巨人化', icon: '🦣', desc: '体型+80%，HP+100，移速-20%', rarity: 'epic', apply: () => { player.radius *= 1.8; player.maxHp += 100; player.hp += 100; player.speed *= 0.8; hpEl.innerText = Math.floor(player.hp); } },
        { id: 'tiny', name: '迷你化', icon: '🐜', desc: '体型-50%，移速+40%，HP-20', rarity: 'epic', apply: () => { player.radius *= 0.5; player.speed *= 1.4; player.maxHp -= 20; player.hp = Math.min(player.hp, player.maxHp); hpEl.innerText = Math.floor(player.hp); } },
        { id: 'crit', name: '致命打击', icon: '🎯', desc: '暴击率+25%，暴击伤害+50%', rarity: 'epic', apply: () => { player.critChance += 0.25; player.critDamage += 0.5; } },
        
        // 🟠 传说天赋
        { id: 'oneshot', name: '一击必杀', icon: '⚡', desc: '5%几率秒杀普通敌人', rarity: 'legendary', apply: () => { player.instakillChance = 0.05; } },
        { id: 'phoenix', name: '凤凰涅槃', icon: '🔥', desc: '死亡时复活一次(50%HP)', rarity: 'legendary', apply: () => { player.revive = true; } },
        { id: 'lightning', name: '雷神之力', icon: '⚡', desc: '开局获得连锁闪电', rarity: 'legendary', apply: () => { weapons.lightning.owned = true; weapons.lightning.level = 1; } },
        { id: 'slowmo', name: '时间减速', icon: '⏱️', desc: '敌人移速-25%', rarity: 'legendary', apply: () => { player.slowEnemies = 0.75; } },
        { id: 'multishot', name: '多重射击', icon: '🎆', desc: '开局子弹+2，穿透+2', rarity: 'legendary', apply: () => { weapons.bullet.count += 2; weapons.bullet.pierce += 2; } },
        { id: 'regen', name: '超级回复', icon: '💚', desc: '每秒回复2HP', rarity: 'legendary', apply: () => { player.hpRegen = 2; } }
    ];

    // 天赋随机选择
    function rollTalents() {
        const shuffled = [...allTalents].sort(() => Math.random() - 0.5);
        // 加权：传说更少出现
        const weighted = shuffled.sort((a, b) => {
            const order = { common: 0, rare: 1, epic: 2, legendary: 3 };
            return order[a.rarity] - order[b.rarity] + (Math.random() - 0.5) * 2;
        });
        return weighted.slice(0, 6);
    }

    function renderTalentCards(talents) {
        talentCardsEl.innerHTML = '';
        talents.forEach(t => {
            const card = document.createElement('div');
            card.className = 'talent-card';
            card.dataset.id = t.id;
            if (selectedTalents.includes(t.id)) card.classList.add('selected');
            card.innerHTML = `
                <div class="talent-icon">${t.icon}</div>
                <div class="talent-name">${t.name}</div>
                <div class="talent-desc">${t.desc}</div>
                <div class="talent-rarity rarity-${t.rarity}">${{common:'普通',rare:'稀有',epic:'史诗',legendary:'传说'}[t.rarity]}</div>
            `;
            card.onclick = () => toggleTalent(t.id);
            talentCardsEl.appendChild(card);
        });
    }

    function toggleTalent(id) {
        if (selectedTalents.includes(id)) {
            selectedTalents = selectedTalents.filter(t => t !== id);
        } else if (selectedTalents.length < 3) {
            selectedTalents.push(id);
        }
        updateTalentUI();
    }

    function updateTalentUI() {
        document.querySelectorAll('.talent-card').forEach(card => {
            card.classList.toggle('selected', selectedTalents.includes(card.dataset.id));
        });
        startBtn.disabled = selectedTalents.length === 0;
        startBtn.innerText = selectedTalents.length === 0 ? '请选择天赋' : `开始游戏 (已选 ${selectedTalents.length}/3)`;
    }

    // 初始化天赋选择
    let currentTalentPool = rollTalents();
    renderTalentCards(currentTalentPool);

    rerollBtn.onclick = () => {
        if (rerollsLeft > 0) {
            rerollsLeft--;
            selectedTalents = [];
            currentTalentPool = rollTalents();
            renderTalentCards(currentTalentPool);
            updateTalentUI();
            rerollBtn.innerText = `🎲 重新随机 (剩余 ${rerollsLeft} 次)`;
            if (rerollsLeft === 0) { rerollBtn.disabled = true; rerollBtn.style.opacity = 0.5; }
        }
    };

    startBtn.onclick = () => {
        // 应用天赋
        selectedTalents.forEach(id => {
            const talent = allTalents.find(t => t.id === id);
            if (talent) {
                talent.apply();
                activeTalents.push(talent);
            }
        });
        // 显示激活的天赋
        updateActiveTalentsDisplay();
        // 隐藏选择界面，开始游戏
        talentSelectEl.style.display = 'none';
        gameLoop();
    };

    function updateActiveTalentsDisplay() {
        if (activeTalents.length > 0) {
            activeTalentsEl.innerText = '天赋: ' + activeTalents.map(t => `${t.icon}${t.name}`).join(' ');
        }
    }

    // --- 敌人类型定义（新版：蛋壳怪、瓢虫等）---
    const enemyTypes = {
        // 基础敌人
        eggshell: { name: '蛋壳怪', color: '#ffffff', radius: 12, baseHp: 15, baseSpeed: 1.2, expDrop: 1, behavior: 'normal', shape: 'eggshell', weight: 35, unlock: 0 },
        ladybug: { name: '瓢虫', color: '#cc3333', radius: 10, baseHp: 12, baseSpeed: 1.8, expDrop: 1, behavior: 'zigzag', shape: 'ladybug', weight: 30, unlock: 0 },
        // 进阶敌人
        angryEgg: { name: '愤怒蛋壳', color: '#ffcccc', radius: 14, baseHp: 25, baseSpeed: 1.0, expDrop: 2, behavior: 'charge', shape: 'angryEgg', weight: 20, unlock: 30 },
        goldenBug: { name: '金甲虫', color: '#ffd700', radius: 11, baseHp: 20, baseSpeed: 2.0, expDrop: 3, behavior: 'dash', shape: 'goldenBug', weight: 15, unlock: 30 },
        // 中级敌人
        ghostEgg: { name: '幽灵蛋', color: 'rgba(200,200,255,0.7)', radius: 13, baseHp: 30, baseSpeed: 1.0, expDrop: 3, behavior: 'phase', shape: 'ghostEgg', weight: 15, unlock: 60 },
        spiderBug: { name: '蜘蛛虫', color: '#333333', radius: 9, baseHp: 18, baseSpeed: 2.2, expDrop: 2, behavior: 'swoop', shape: 'spiderBug', weight: 18, unlock: 60 },
        // 高级敌人

    // === 绘制紫色场景地板 ===
    function drawBackground() {
        // 主背景色
        ctx.fillStyle = '#4a3a6a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 绘制地板格子
        const tileSize = 60;
        const offsetX = (frameCount * 0.2) % tileSize;
        const offsetY = (frameCount * 0.2) % tileSize;
        
        for (let x = -tileSize; x < canvas.width + tileSize; x += tileSize) {
            for (let y = -tileSize; y < canvas.height + tileSize; y += tileSize) {
                const px = x - offsetX;
                const py = y - offsetY;
                
                // 地板砖
                ctx.fillStyle = '#5a4a7a';
                ctx.fillRect(px + 2, py + 2, tileSize - 4, tileSize - 4);
                
                // 地板高光边缘
                ctx.fillStyle = '#6a5a8a';
                ctx.fillRect(px + 2, py + 2, tileSize - 4, 3);
                ctx.fillRect(px + 2, py + 2, 3, tileSize - 4);
                
                // 地板阴影边缘
                ctx.fillStyle = '#3a2a5a';
                ctx.fillRect(px + 2, py + tileSize - 5, tileSize - 4, 3);
                ctx.fillRect(px + tileSize - 5, py + 2, 3, tileSize - 4);
            }
        }
        
        // 绘制裂缝纹理（随机位置但固定种子）
        ctx.strokeStyle = '#2a1a4a';
        ctx.lineWidth = 2;
        for (let i = 0; i < 8; i++) {
            const cx = ((i * 137 + 50) % canvas.width);
            const cy = ((i * 89 + 30) % canvas.height);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + 20 + (i % 3) * 10, cy + 15);
            ctx.lineTo(cx + 10, cy + 30 + (i % 2) * 10);
            ctx.stroke();
        }
        
        // 深色阴影区域（不规则形状）
        ctx.fillStyle = 'rgba(30, 20, 50, 0.4)';
        ctx.beginPath();
        ctx.moveTo(50, 100);
        ctx.quadraticCurveTo(100, 80, 150, 120);
        ctx.quadraticCurveTo(180, 160, 120, 180);
        ctx.quadraticCurveTo(60, 160, 50, 100);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(300, 400);
        ctx.quadraticCurveTo(380, 380, 420, 450);
        ctx.quadraticCurveTo(400, 520, 320, 500);
        ctx.quadraticCurveTo(280, 460, 300, 400);
        ctx.fill();
    }

    // === 绘制顶视角拿枪角色 ===
    function drawPlayer() {
        ctx.save();
        const px = player.x, py = player.y;
        const scale = player.radius / 14;
        
        // 角色旋转到朝向角度
        ctx.translate(px, py);
        ctx.rotate(player.angle);
        ctx.scale(scale, scale);
        
        // 阴影
        ctx.beginPath();
        ctx.ellipse(0, 2, 12, 6, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fill();
        
        // === 身体（顶视角 - 橙色外套） ===
        // 外套主体
        ctx.fillStyle = '#e86a30'; // 橙色
        ctx.beginPath();
        ctx.ellipse(0, 0, 11, 13, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // 外套领子阴影
        ctx.fillStyle = '#c85520';
        ctx.beginPath();
        ctx.ellipse(0, 2, 8, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // 内部衣服
        ctx.fillStyle = '#f8f8f8';
        ctx.beginPath();
        ctx.ellipse(0, 1, 5, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // === 头部 ===
        // 白色蓬松头发（从顶部看）
        ctx.fillStyle = '#f0f0f0';
        ctx.beginPath();
        ctx.arc(0, -5, 10, 0, Math.PI * 2);
        ctx.fill();
        
        // 头发蓬松效果
        ctx.fillStyle = '#e8e8e8';
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const hx = Math.cos(angle) * 8;
            const hy = -5 + Math.sin(angle) * 7;
            ctx.beginPath();
            ctx.arc(hx, hy, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 头发高光
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(-3, -8, 3, 0, Math.PI * 2);
        ctx.fill();
        
        // === 红色围巾/配件 ===
        ctx.fillStyle = '#cc3333';
        ctx.beginPath();
        ctx.moveTo(-4, 8);
        ctx.quadraticCurveTo(-8, 15, -6, 20);
        ctx.quadraticCurveTo(-2, 18, 0, 12);
        ctx.quadraticCurveTo(2, 18, 6, 20);
        ctx.quadraticCurveTo(8, 15, 4, 8);
        ctx.closePath();
        ctx.fill();
        
        // === 手臂和枪 ===
        // 左手臂
        ctx.fillStyle = '#e86a30';
        ctx.save();
        ctx.translate(-8, 0);
        ctx.rotate(-0.3);
        ctx.fillRect(-3, -2, 10, 5);
        ctx.restore();
        
        // 右手臂（持枪）
        ctx.save();
        ctx.translate(8, 0);
        ctx.rotate(0.3);
        ctx.fillStyle = '#e86a30';
        ctx.fillRect(-3, -2, 12, 5);
        
        // 枪
        const gunRecoil = player.isAttacking ? Math.sin(player.attackFrame * 0.5) * 2 : 0;
        ctx.translate(10 - gunRecoil, 0);
        
        // 枪身
        ctx.fillStyle = '#333';
        ctx.fillRect(0, -3, 15, 6);
        
        // 枪口
        ctx.fillStyle = '#222';
        ctx.fillRect(13, -2, 5, 4);
        
        // 枪把
        ctx.fillStyle = '#4a3020';
        ctx.fillRect(-2, 1, 5, 6);
        
        // 枪口火焰（攻击时）
        if (player.isAttacking && player.attackFrame < 4) {
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.arc(20, 0, 4 + player.attackFrame, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.arc(20, 0, 2 + player.attackFrame * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.restore();
        
        // 狂战士效果
        if (player.berserker && player.hp < player.maxHp * 0.5) {
            const rage = 1 - (player.hp / player.maxHp);
            ctx.globalAlpha = 0.3 + rage * 0.3;
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20 + rage * 20;
            ctx.shadowColor = '#ff0000';
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        ctx.restore();
    }

    function updatePlayerAnimation(moveX, moveY, targetAngle) {
        // 更新朝向角度（平滑过渡到目标方向）
        if (targetAngle !== undefined) {
            // 平滑旋转
            let diff = targetAngle - player.angle;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            player.angle += diff * 0.2;
        }
        
        // 更新行走动画
        if (Math.abs(moveX) > 0.1 || Math.abs(moveY) > 0.1) {
            player.walkFrame++;
        }
        
        // 更新攻击动画
        if (player.isAttacking) {
            player.attackFrame++;
            if (player.attackFrame >= player.attackMaxFrames) {
                player.isAttacking = false;
                player.attackFrame = 0;
            }
        }
        
        player.lastMoveX = moveX;
        player.lastMoveY = moveY;
    }

    // 响应式 Canvas - 竖版全屏适配
    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');

        // 获取可用高度（排除顶部UI和底部控制区）
        const topUI = document.getElementById('top-ui');
        const controls = document.getElementById('controls');
        const topHeight = topUI ? topUI.offsetHeight : 0;
        const controlsHeight = isTouchDevice ? (controls ? controls.offsetHeight : 180) : 0;
        
        const availableHeight = window.innerHeight - topHeight - controlsHeight;
        const availableWidth = Math.min(window.innerWidth, 450);
        
        // 保持宽高比 450:600
        const aspectRatio = 450 / 600;
        let canvasWidth, canvasHeight;
        
        if (availableWidth / availableHeight > aspectRatio) {
            // 高度限制
            canvasHeight = availableHeight;
            canvasWidth = canvasHeight * aspectRatio;
        } else {
            // 宽度限制
            canvasWidth = availableWidth;
            canvasHeight = canvasWidth / aspectRatio;
        }
        
        canvas.style.width = canvasWidth + 'px';
        canvas.style.height = canvasHeight + 'px';
    }

    // 触屏事件处理
    function handleJoystickStart(e) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const rect = joystickContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        // 检查触摸是否在摇杆区域附近
        const distFromCenter = Math.hypot(touch.clientX - centerX, touch.clientY - centerY);
        if (distFromCenter < 120) {
            joystickActive = true;
            joystickTouchId = touch.identifier;
            updateJoystickPosition(touch.clientX, touch.clientY, rect);
        }
    }

    function handleJoystickMove(e) {
        if (!joystickActive) return;
        e.preventDefault();
        
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            if (touch.identifier === joystickTouchId) {
                const rect = joystickContainer.getBoundingClientRect();
                updateJoystickPosition(touch.clientX, touch.clientY, rect);
                break;
            }
        }
    }

    function handleJoystickEnd(e) {
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === joystickTouchId) {
                joystickActive = false;
                joystickTouchId = null;
                joystickInput = { x: 0, y: 0 };
                // 重置摇杆位置 (居中于 140x140 容器)
                joystickStick.style.left = '40px';
                joystickStick.style.top = '40px';
                break;
            }
        }
    }

    function updateJoystickPosition(touchX, touchY, rect) {
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let deltaX = touchX - centerX;
        let deltaY = touchY - centerY;
        
        // 限制在最大距离内
        const distance = Math.hypot(deltaX, deltaY);
        if (distance > joystickMaxDistance) {
            deltaX = (deltaX / distance) * joystickMaxDistance;
            deltaY = (deltaY / distance) * joystickMaxDistance;
        }
        
        // 更新摇杆位置
        joystickStick.style.left = (40 + deltaX) + 'px';
        joystickStick.style.top = (40 + deltaY) + 'px';
        
        // 计算输入值 (-1 到 1)
        joystickInput.x = deltaX / joystickMaxDistance;
        joystickInput.y = deltaY / joystickMaxDistance;
    }

    // 绑定触屏事件 - 始终绑定以支持竖版布局

    function getUpgradePool() {

        basicWeapons.forEach(key => {
            const w = weapons[key];
            if (w.level < w.maxLevel) {
                pool.push(createWeaponUpgrade(key, w));
            }
        });

        // 特殊武器（等级5+或击败Boss后解锁）
        if (player.level >= 5 || bossDefeated > 0) {
            const specialWeapons = ['lightning', 'laser', 'blackhole', 'meteor'];
            specialWeapons.forEach(key => {
                const w = weapons[key];
                if (w.level < w.maxLevel) {
                    pool.push(createWeaponUpgrade(key, w, true));
                }
            });
        }

        // 通用升级
        pool.push(
            { name: '动力鞋', type: '被动', desc: '移速+15%', apply: () => player.speed *= 1.15 },
            { name: '磁铁', type: '被动', desc: '拾取范围+50', apply: () => player.pickupRange += 50 },
