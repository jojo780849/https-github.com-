<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>生存割草 V8 - 手机竖版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden; background-color: #0a0a0a;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; min-height: -webkit-fill-available;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        html { height: -webkit-fill-available; }
        
        /* 游戏容器 - 竖版布局 */
        #game-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 450px; height: 100vh; height: 100dvh;
            position: relative;
        }
        
        /* 顶部 UI 区域 */
        #top-ui {
            width: 100%; padding: 8px 12px; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 4px; z-index: 10;
        }
        #top-row { display: flex; justify-content: space-between; align-items: center; }
        #stats { font-size: 14px; font-weight: bold; }
        #timer { font-size: 20px; font-weight: bold; color: #00e5ff; }
        #exp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #exp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00e5ff, #00ff88); transition: width 0.2s; }
        #weapons-display { font-size: 12px; color: #aaa; margin-top: 2px; }
        #active-talents { font-size: 11px; color: #888; }
        
        /* 游戏画布区域 */
        #canvas-wrapper {
            flex: 1; width: 100%; display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }
        canvas { background-color: #1a1a1a; width: 100%; height: 100%; display: block; }
        
        /* Boss 血条 */
        #boss-bar-container { 
            display: none; position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; text-align: center; z-index: 20;
        }
        #boss-name { font-size: 14px; color: #ff4444; margin-bottom: 3px; text-shadow: 0 0 10px #ff0000; }
        #boss-bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; border: 2px solid #ff4444; }
        #boss-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff6600); transition: width 0.3s; }
        
        /* Boss 警告 */
        #boss-warning {
            display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 28px; color: #ff0000; text-shadow: 0 0 30px #ff0000;
            animation: blink 0.3s infinite; z-index: 30;
        }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* 波次提示 */
        #wave-notice {
            display: none; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; color: #ffaa00; text-shadow: 0 0 20px #ff6600;
            animation: fadeInOut 2s forwards; pointer-events: none; z-index: 30;
        }
        @keyframes fadeInOut { 0%,100% { opacity: 0; } 20%,80% { opacity: 1; } }
        
        /* 敌人统计 */
        #enemy-stats { 
            position: absolute; bottom: 5px; left: 10px; 
            font-size: 10px; opacity: 0.6; pointer-events: none; z-index: 20;
        }
        
        /* 底部控制区域 */
        #controls {
            width: 100%; height: 180px; min-height: 180px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            display: flex; justify-content: center; align-items: center;
            position: relative; padding: 10px;
        }
        
        /* 虚拟摇杆 */
        #joystick-container {
            width: 140px; height: 140px; position: relative;
        }
        #joystick-base {
            position: absolute; width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            border: 3px solid rgba(255,255,255,0.4); border-radius: 50%;
        }
        #joystick-stick {
            position: absolute; width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(0,229,255,0.9) 0%, rgba(0,229,255,0.5) 100%);
            border: 3px solid rgba(0,229,255,1); border-radius: 50%;
            left: 40px; top: 40px; /* 居中 */
            box-shadow: 0 0 20px rgba(0,229,255,0.6);
        }
        
        #mobile-hint {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: rgba(255,255,255,0.4); pointer-events: none;
        }

        /* 升级菜单 */
        #levelup-menu {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; padding: 20px;
        }
        #levelup-menu h1 { color: #00e5ff; margin: 0 0 15px 0; font-size: 22px; }
        #cards-container { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; 
            max-width: 100%; overflow-y: auto; max-height: 70vh;
        }
        .card {
            background: #2a2a2a; padding: 12px; border-radius: 10px; cursor: pointer;
            transition: all 0.2s; border: 2px solid #444; width: calc(50% - 10px); max-width: 160px;
        }
        .card:active { background: #3a3a3a; border-color: #00e5ff; transform: scale(0.98); }
        .card h3 { margin: 0 0 5px 0; color: #ffd700; font-size: 14px; }
        .card .type { font-size: 10px; color: #888; margin-bottom: 3px; }
        .card p { font-size: 11px; margin: 0; color: #ccc; }
        .card-new { border-color: #ff6b00 !important; }
        .card-special { border-color: #ff00ff !important; background: linear-gradient(135deg, #2a2a2a, #3a2a3a) !important; }
        .card-special h3 { color: #ff66ff !important; }

        /* 开局天赋选择 */
        #talent-select {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; z-index: 100;
            padding: 20px; padding-top: max(20px, env(safe-area-inset-top));
            overflow-y: auto;
        }
        #talent-select h1 { color: #ffd700; margin-bottom: 5px; font-size: 26px; }
        #talent-select .subtitle { color: #888; margin-bottom: 15px; font-size: 13px; text-align: center; }
        #talent-cards { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; 
            width: 100%; max-width: 400px;
        }
        .talent-card {
            padding: 12px; background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 2px solid #444; border-radius: 12px; cursor: pointer; text-align: center;
            transition: all 0.2s;
        }
        .talent-card:active { transform: scale(0.98); }
        .talent-card.selected { border-color: #00e5ff; background: linear-gradient(135deg, #1a3a4a, #2a4a5a); }
        .talent-icon { font-size: 32px; margin-bottom: 5px; }
        .talent-name { font-size: 14px; font-weight: bold; color: #ffd700; margin-bottom: 3px; }
        .talent-desc { font-size: 11px; color: #aaa; }
        .talent-rarity { font-size: 9px; margin-top: 4px; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .rarity-common { background: #555; color: #ddd; }
        .rarity-rare { background: #1a4a8a; color: #66aaff; }
        .rarity-epic { background: #6a2a8a; color: #cc66ff; }
        .rarity-legendary { background: #8a4a00; color: #ffaa00; }
        #talent-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; margin-top: 15px; }
        #reroll-btn { padding: 12px; background: #333; border: 1px solid #555; color: #aaa; border-radius: 8px; cursor: pointer; font-size: 14px; }
        #start-btn { padding: 15px; background: linear-gradient(135deg, #00aa66, #00dd88); border: none; color: #fff; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #start-btn:disabled { background: #444; color: #666; }
        
        /* 桌面端样式 */
        @media (min-width: 500px) and (pointer: fine) {
            #game-container { max-width: 450px; border: 2px solid #333; }
            #controls { display: none; }
            body::after {
                content: '🎮 桌面端请使用 WASD 移动';
                position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
                font-size: 14px; color: #666;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 顶部 UI -->
        <div id="top-ui">
            <div id="top-row">
                <div id="stats">Lv.<span id="level">1</span> | 🗡️<span id="score">0</span> | ❤️<span id="hp">100</span></div>
                <div id="timer">00:00</div>
            </div>
            <div id="exp-bar-container"><div id="exp-bar"></div></div>
            <div id="weapons-display">武器: <span id="weapon-list">🔫弹射</span></div>
            <div id="active-talents"></div>
        </div>
        
        <!-- 游戏画布区域 -->
        <div id="canvas-wrapper">
            <canvas id="gameCanvas" width="450" height="600"></canvas>
            <div id="boss-bar-container">
                <div id="boss-name">⚠️ BOSS ⚠️</div>
                <div id="boss-bar-bg"><div id="boss-bar"></div></div>
            </div>
            <div id="boss-warning">⚠️ BOSS ⚠️</div>
            <div id="wave-notice"></div>
            <div id="enemy-stats"></div>
        </div>
        
        <!-- 底部控制区域 -->
        <div id="controls">
            <div id="joystick-container">
                <div id="joystick-base"></div>
                <div id="joystick-stick"></div>
            </div>
            <div id="mobile-hint">🕹️ 滑动摇杆移动 | 自动攻击</div>
        </div>
    </div>

    <!-- 开局天赋选择 -->
    <div id="talent-select">
        <h1>🎭 选择天赋</h1>
        <p class="subtitle">选择 1-3 个天赋开始游戏</p>
        <div id="talent-cards"></div>
        <div id="talent-buttons">
            <button id="reroll-btn">🎲 重新随机 (剩余 3 次)</button>
            <button id="start-btn" disabled>开始游戏</button>
        </div>
    </div>

    <!-- 升级菜单 -->
    <div id="levelup-menu">
        <h1>🎯 升级！选择能力</h1>
        <div id="cards-container"></div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const hpEl = document.getElementById('hp');
    const levelEl = document.getElementById('level');
    const expBar = document.getElementById('exp-bar');
    const levelUpMenu = document.getElementById('levelup-menu');
    const cardsContainer = document.getElementById('cards-container');
    const weaponListEl = document.getElementById('weapon-list');
    const timerEl = document.getElementById('timer');
    const bossBarContainer = document.getElementById('boss-bar-container');
    const bossBar = document.getElementById('boss-bar');
    const bossNameEl = document.getElementById('boss-name');
    const bossWarning = document.getElementById('boss-warning');
    const waveNotice = document.getElementById('wave-notice');
    const enemyStatsEl = document.getElementById('enemy-stats');
    const talentSelectEl = document.getElementById('talent-select');
    const talentCardsEl = document.getElementById('talent-cards');
    const rerollBtn = document.getElementById('reroll-btn');
    const startBtn = document.getElementById('start-btn');
    const activeTalentsEl = document.getElementById('active-talents');
    const joystickContainer = document.getElementById('joystick-container');
    const joystickStick = document.getElementById('joystick-stick');

    let score = 0;
    let frameCount = 0;
    let gameTime = 0; // 游戏时间（秒）
    let isGameOver = false;
    let isPaused = false;
    let currentBoss = null;
    let bossDefeated = 0;
    let rerollsLeft = 3;
    let selectedTalents = [];
    let activeTalents = []; // 当前生效的天赋

    // === 天赋系统定义 ===
    const allTalents = [
        // 🟢 普通天赋
        { id: 'swift', name: '疾风', icon: '💨', desc: '移速+30%', rarity: 'common', apply: () => { player.speed *= 1.3; } },
        { id: 'tough', name: '坚韧', icon: '🛡️', desc: '最大HP+50', rarity: 'common', apply: () => { player.maxHp += 50; player.hp += 50; hpEl.innerText = Math.floor(player.hp); } },
        { id: 'magnet', name: '磁力', icon: '🧲', desc: '拾取范围+100', rarity: 'common', apply: () => { player.pickupRange += 100; } },
        { id: 'lucky', name: '幸运儿', icon: '🍀', desc: '升级选项+1', rarity: 'common', apply: () => { player.upgradeChoices = 5; } },
        { id: 'bigshot', name: '大号弹药', icon: '🔮', desc: '子弹体积+50%', rarity: 'common', apply: () => { player.bulletSizeBonus = 1.5; } },
        
        // 🔵 稀有天赋
        { id: 'vampire', name: '吸血本能', icon: '🩸', desc: '击杀回复1HP', rarity: 'rare', apply: () => { player.lifestealOnKill = 1; } },
        { id: 'berserker', name: '狂战士', icon: '🔥', desc: 'HP越低伤害越高(最高+100%)', rarity: 'rare', apply: () => { player.berserker = true; } },
        { id: 'glass', name: '玻璃大炮', icon: '💎', desc: '伤害+50%，但最大HP-30', rarity: 'rare', apply: () => { player.damageBonus = 1.5; player.maxHp -= 30; player.hp = Math.min(player.hp, player.maxHp); hpEl.innerText = Math.floor(player.hp); } },
        { id: 'duelist', name: '决斗者', icon: '⚔️', desc: '对Boss伤害+80%', rarity: 'rare', apply: () => { player.bossDamageBonus = 1.8; } },
        { id: 'treasure', name: '寻宝者', icon: '💰', desc: '经验获取+50%', rarity: 'rare', apply: () => { player.expBonus = 1.5; } },
        { id: 'dodge', name: '幻影', icon: '👤', desc: '30%几率闪避伤害', rarity: 'rare', apply: () => { player.dodgeChance = 0.3; } },
        
        // 🟣 史诗天赋
        { id: 'orbital', name: '卫星启动', icon: '🛸', desc: '开局获得环绕护盾', rarity: 'epic', apply: () => { weapons.orbit.owned = true; weapons.orbit.level = 1; initOrbitals(); } },
        { id: 'summon', name: '灵魂契约', icon: '👻', desc: '开局获得幽灵召唤', rarity: 'epic', apply: () => { weapons.summon.owned = true; weapons.summon.level = 1; spawnSummon(); } },
        { id: 'explosive', name: '爆破专家', icon: '💥', desc: '开局获得爆裂魔法', rarity: 'epic', apply: () => { weapons.explosion.owned = true; weapons.explosion.level = 1; } },
        { id: 'giant', name: '巨人化', icon: '🦣', desc: '体型+80%，HP+100，移速-20%', rarity: 'epic', apply: () => { player.radius *= 1.8; player.maxHp += 100; player.hp += 100; player.speed *= 0.8; hpEl.innerText = Math.floor(player.hp); } },
        { id: 'tiny', name: '迷你化', icon: '🐜', desc: '体型-50%，移速+40%，HP-20', rarity: 'epic', apply: () => { player.radius *= 0.5; player.speed *= 1.4; player.maxHp -= 20; player.hp = Math.min(player.hp, player.maxHp); hpEl.innerText = Math.floor(player.hp); } },
        { id: 'crit', name: '致命打击', icon: '🎯', desc: '暴击率+25%，暴击伤害+50%', rarity: 'epic', apply: () => { player.critChance += 0.25; player.critDamage += 0.5; } },
        
        // 🟠 传说天赋
        { id: 'oneshot', name: '一击必杀', icon: '⚡', desc: '5%几率秒杀普通敌人', rarity: 'legendary', apply: () => { player.instakillChance = 0.05; } },
        { id: 'phoenix', name: '凤凰涅槃', icon: '🔥', desc: '死亡时复活一次(50%HP)', rarity: 'legendary', apply: () => { player.revive = true; } },
        { id: 'lightning', name: '雷神之力', icon: '⚡', desc: '开局获得连锁闪电', rarity: 'legendary', apply: () => { weapons.lightning.owned = true; weapons.lightning.level = 1; } },
        { id: 'slowmo', name: '时间减速', icon: '⏱️', desc: '敌人移速-25%', rarity: 'legendary', apply: () => { player.slowEnemies = 0.75; } },
        { id: 'multishot', name: '多重射击', icon: '🎆', desc: '开局子弹+2，穿透+2', rarity: 'legendary', apply: () => { weapons.bullet.count += 2; weapons.bullet.pierce += 2; } },
        { id: 'regen', name: '超级回复', icon: '💚', desc: '每秒回复2HP', rarity: 'legendary', apply: () => { player.hpRegen = 2; } }
    ];

    // 天赋随机选择
    function rollTalents() {
        const shuffled = [...allTalents].sort(() => Math.random() - 0.5);
        // 加权：传说更少出现
        const weighted = shuffled.sort((a, b) => {
            const order = { common: 0, rare: 1, epic: 2, legendary: 3 };
            return order[a.rarity] - order[b.rarity] + (Math.random() - 0.5) * 2;
        });
        return weighted.slice(0, 6);
    }

    function renderTalentCards(talents) {
        talentCardsEl.innerHTML = '';
        talents.forEach(t => {
            const card = document.createElement('div');
            card.className = 'talent-card';
            card.dataset.id = t.id;
            if (selectedTalents.includes(t.id)) card.classList.add('selected');
            card.innerHTML = `
                <div class="talent-icon">${t.icon}</div>
                <div class="talent-name">${t.name}</div>
                <div class="talent-desc">${t.desc}</div>
                <div class="talent-rarity rarity-${t.rarity}">${{common:'普通',rare:'稀有',epic:'史诗',legendary:'传说'}[t.rarity]}</div>
            `;
            card.onclick = () => toggleTalent(t.id);
            talentCardsEl.appendChild(card);
        });
    }

    function toggleTalent(id) {
        if (selectedTalents.includes(id)) {
            selectedTalents = selectedTalents.filter(t => t !== id);
        } else if (selectedTalents.length < 3) {
            selectedTalents.push(id);
        }
        updateTalentUI();
    }

    function updateTalentUI() {
        document.querySelectorAll('.talent-card').forEach(card => {
            card.classList.toggle('selected', selectedTalents.includes(card.dataset.id));
        });
        startBtn.disabled = selectedTalents.length === 0;
        startBtn.innerText = selectedTalents.length === 0 ? '请选择天赋' : `开始游戏 (已选 ${selectedTalents.length}/3)`;
    }

    // 初始化天赋选择
    let currentTalentPool = rollTalents();
    renderTalentCards(currentTalentPool);

    rerollBtn.onclick = () => {
        if (rerollsLeft > 0) {
            rerollsLeft--;
            selectedTalents = [];
            currentTalentPool = rollTalents();
            renderTalentCards(currentTalentPool);
            updateTalentUI();
            rerollBtn.innerText = `🎲 重新随机 (剩余 ${rerollsLeft} 次)`;
            if (rerollsLeft === 0) { rerollBtn.disabled = true; rerollBtn.style.opacity = 0.5; }
        }
    };

    startBtn.onclick = () => {
        // 应用天赋
        selectedTalents.forEach(id => {
            const talent = allTalents.find(t => t.id === id);
            if (talent) {
                talent.apply();
                activeTalents.push(talent);
            }
        });
        // 显示激活的天赋
        updateActiveTalentsDisplay();
        // 隐藏选择界面，开始游戏
        talentSelectEl.style.display = 'none';
        gameLoop();
    };

    function updateActiveTalentsDisplay() {
        if (activeTalents.length > 0) {
            activeTalentsEl.innerText = '天赋: ' + activeTalents.map(t => `${t.icon}${t.name}`).join(' ');
        }
    }

    // --- 敌人类型定义 ---
    const enemyTypes = {
        slime: { name: '史莱姆', color: '#44dd44', radius: 10, baseHp: 15, baseSpeed: 1.2, expDrop: 1, behavior: 'normal', shape: 'slime', weight: 30, unlock: 0 },
        zombie: { name: '僵尸', color: '#668866', radius: 12, baseHp: 25, baseSpeed: 0.8, expDrop: 2, behavior: 'normal', shape: 'humanoid', weight: 25, unlock: 0 },
        skeleton: { name: '骷髅战士', color: '#ddddcc', radius: 11, baseHp: 20, baseSpeed: 1.5, expDrop: 2, behavior: 'zigzag', shape: 'skeleton', weight: 20, unlock: 30 },
        bat: { name: '蝙蝠', color: '#8855aa', radius: 8, baseHp: 10, baseSpeed: 2.5, expDrop: 1, behavior: 'swoop', shape: 'bat', weight: 25, unlock: 30 },
        ghost: { name: '幽灵', color: 'rgba(200,200,255,0.7)', radius: 13, baseHp: 30, baseSpeed: 1.0, expDrop: 3, behavior: 'phase', shape: 'ghost', weight: 15, unlock: 60 },
        imp: { name: '小恶魔', color: '#ff6644', radius: 9, baseHp: 18, baseSpeed: 1.8, expDrop: 2, behavior: 'dash', shape: 'imp', weight: 20, unlock: 60 },
        werewolf: { name: '狼人', color: '#775544', radius: 14, baseHp: 50, baseSpeed: 2.0, expDrop: 4, behavior: 'charge', shape: 'werewolf', weight: 12, unlock: 90 },
        mage: { name: '黑暗法师', color: '#6633aa', radius: 11, baseHp: 25, baseSpeed: 1.0, expDrop: 5, behavior: 'ranged', shape: 'mage', weight: 10, unlock: 90 },
        golem: { name: '石魔像', color: '#888888', radius: 20, baseHp: 120, baseSpeed: 0.5, expDrop: 8, behavior: 'tank', shape: 'golem', weight: 8, unlock: 120 },
        banshee: { name: '女妖', color: '#aaddff', radius: 12, baseHp: 35, baseSpeed: 1.3, expDrop: 5, behavior: 'scream', shape: 'banshee', weight: 10, unlock: 120 },
        vampire: { name: '吸血鬼', color: '#aa2222', radius: 13, baseHp: 60, baseSpeed: 1.6, expDrop: 6, behavior: 'lifesteal', shape: 'vampire', weight: 8, unlock: 180 },

    // 响应式 Canvas - 竖版全屏适配
    function resizeCanvas() {
        const wrapper = document.getElementById('canvas-wrapper');
        const container = document.getElementById('game-container');
        
        // 获取可用高度（排除顶部UI和底部控制区）
        const topUI = document.getElementById('top-ui');
        const controls = document.getElementById('controls');
        const topHeight = topUI ? topUI.offsetHeight : 0;
        const controlsHeight = isTouchDevice ? (controls ? controls.offsetHeight : 180) : 0;
        
        const availableHeight = window.innerHeight - topHeight - controlsHeight;
        const availableWidth = Math.min(window.innerWidth, 450);
        
        // 保持宽高比 450:600
        const aspectRatio = 450 / 600;
        let canvasWidth, canvasHeight;
        
        if (availableWidth / availableHeight > aspectRatio) {
            // 高度限制
            canvasHeight = availableHeight;
            canvasWidth = canvasHeight * aspectRatio;
        } else {
            // 宽度限制
            canvasWidth = availableWidth;
            canvasHeight = canvasWidth / aspectRatio;
        }
        
        canvas.style.width = canvasWidth + 'px';
        canvas.style.height = canvasHeight + 'px';
    }

    // 触屏事件处理
    function handleJoystickStart(e) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const rect = joystickContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        // 检查触摸是否在摇杆区域附近
        const distFromCenter = Math.hypot(touch.clientX - centerX, touch.clientY - centerY);
        if (distFromCenter < 120) {
            joystickActive = true;
            joystickTouchId = touch.identifier;
            updateJoystickPosition(touch.clientX, touch.clientY, rect);
        }
    }

    function handleJoystickMove(e) {
        if (!joystickActive) return;
        e.preventDefault();
        
        for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            if (touch.identifier === joystickTouchId) {
                const rect = joystickContainer.getBoundingClientRect();
                updateJoystickPosition(touch.clientX, touch.clientY, rect);
                break;
            }
        }
    }

    function handleJoystickEnd(e) {
        for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === joystickTouchId) {
                joystickActive = false;
                joystickTouchId = null;
                joystickInput = { x: 0, y: 0 };
                // 重置摇杆位置 (居中于 140x140 容器)
                joystickStick.style.left = '40px';
                joystickStick.style.top = '40px';
                break;
            }
        }
    }

    function updateJoystickPosition(touchX, touchY, rect) {
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let deltaX = touchX - centerX;
        let deltaY = touchY - centerY;
        
        // 限制在最大距离内
        const distance = Math.hypot(deltaX, deltaY);
        if (distance > joystickMaxDistance) {
            deltaX = (deltaX / distance) * joystickMaxDistance;
            deltaY = (deltaY / distance) * joystickMaxDistance;
        }
        
        // 更新摇杆位置
        joystickStick.style.left = (40 + deltaX) + 'px';
        joystickStick.style.top = (40 + deltaY) + 'px';
        
        // 计算输入值 (-1 到 1)
        joystickInput.x = deltaX / joystickMaxDistance;
        joystickInput.y = deltaY / joystickMaxDistance;
    }

    // --- 升级池 ---
    function getUpgradePool() {

            { name: '磁铁', type: '被动', desc: '拾取范围+50', apply: () => player.pickupRange += 50 },

    // 选择敌人类型
    function selectEnemyType() {
        const available = Object.entries(enemyTypes).filter(([k, t]) => gameTime >= t.unlock);
        const totalWeight = available.reduce((sum, [k, t]) => sum + t.weight, 0);
        let random = Math.random() * totalWeight;
        for (const [key, type] of available) {
            random -= type.weight;
            if (random <= 0) return { key, ...type };
        }
        return { key: 'slime', ...enemyTypes.slime };
    }

    function spawnEnemy() {
        const type = selectEnemyType();
        let x, y;
        if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -30 : canvas.width + 30; y = Math.random() * canvas.height; }
        else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -30 : canvas.height + 30; }
        const hpMult = 1 + (gameTime * 0.01) + (player.level * 0.1);
        const speedMult = (1 + (gameTime * 0.002)) * player.slowEnemies; // 应用减速天赋
        enemies.push({
            x, y, radius: type.radius, speed: type.baseSpeed * speedMult, baseSpeed: type.baseSpeed * speedMult,
            hp: type.baseHp * hpMult, maxHp: type.baseHp * hpMult, color: type.color, type: type.key,
            behavior: type.behavior, shape: type.shape, expDrop: type.expDrop,
            behaviorTimer: 0, phase: 0, alpha: 1, dashAngle: 0, dashTimer: 0, chargeAngle: 0, chargeTimer: 0
        });

    function calcDamage(baseDamage, isBoss = false) {
        let damage = baseDamage * player.damageBonus;
        // 狂战士：HP越低伤害越高
        if (player.berserker) {
            const hpPercent = player.hp / player.maxHp;
            damage *= 1 + (1 - hpPercent); // 最高 +100%
        }
        // Boss 伤害加成
        if (isBoss) damage *= player.bossDamageBonus;
        // 暴击
        if (Math.random() < player.critChance) {
            return { damage: damage * player.critDamage, crit: true };
        }
        return { damage, crit: false };
    }

    // --- 武器逻辑 ---
    function fireBullets() {
        const w = weapons.bullet;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        let nearest = null, minDist = w.range;
        enemies.concat(currentBoss ? [currentBoss] : []).forEach(e => {
            const dist = getDistance(player.x, player.y, e.x, e.y);
            if (dist < minDist) { minDist = dist; nearest = e; }
        });
        if (nearest) {
            const baseAngle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
            for (let i = 0; i < w.count; i++) {
                const offset = (i - (w.count - 1) / 2) * 0.15;
                const angle = baseAngle + offset;
                bullets.push({ x: player.x, y: player.y, radius: 5 * player.bulletSizeBonus, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, damage: w.damage, pierceLeft: w.pierce, hitEnemies: new Set() });
            }
            w.currentCooldown = w.cooldown;
        }
    }

    function fireExplosion() {
        const w = weapons.explosion;
        if (!w.owned) return;
        if (w.currentCooldown > 0) { w.currentCooldown--; return; }
        let best = null, maxNearby = 0;
        enemies.forEach(e => {
            let nearby = enemies.filter(o => getDistance(e.x, e.y, o.x, o.y) < w.radius).length;
            if (nearby > maxNearby) { maxNearby = nearby; best = e; }
        });
        if (best) {
            explosions.push({ x: best.x, y: best.y, radius: 0, maxRadius: w.radius, damage: w.damage, hasDamaged: false, alpha: 1 });
            w.currentCooldown = w.cooldown;
        }
    }

    function fireLightning() {
        const w = weapons.lightning;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        if (enemies.length === 0 && !currentBoss) return;
        
        let targets = [...enemies];
        if (currentBoss) targets.push(currentBoss);
        targets.sort((a, b) => getDistance(player.x, player.y, a.x, a.y) - getDistance(player.x, player.y, b.x, b.y));
        
        if (targets.length > 0) {
            let chain = [{ x: player.x, y: player.y }];
            let hit = new Set();
            for (let i = 0; i < w.chains && targets.length > 0; i++) {
                let last = chain[chain.length - 1];
                let nearest = null, minDist = 300;
                targets.forEach(t => {
                    if (!hit.has(t)) {
                        const dist = getDistance(last.x, last.y, t.x, t.y);
                        if (dist < minDist) { minDist = dist; nearest = t; }
                    }
                });
                if (nearest) {
                    chain.push({ x: nearest.x, y: nearest.y, target: nearest });
                    hit.add(nearest);
                    const dmg = calcDamage(w.damage);
                    nearest.hp -= dmg.damage;
                }
            }
            lightnings.push({ chain, alpha: 1 });
            w.currentCooldown = w.cooldown;
        }
    }

    function fireLaser() {
        const w = weapons.laser;
        if (!w.owned) return;
        
        let targets = [...enemies];
        if (currentBoss) targets.push(currentBoss);
        if (targets.length === 0) return;
        
        targets.sort((a, b) => getDistance(player.x, player.y, a.x, a.y) - getDistance(player.x, player.y, b.x, b.y));
        const target = targets[0];
        const angle = Math.atan2(target.y - player.y, target.x - player.x);
        const length = 500;
        
        // 绘制激光
        ctx.save();
        ctx.strokeStyle = `rgba(255, 50, 50, 0.8)`;
        ctx.lineWidth = w.width;
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0000';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(angle) * length, player.y + Math.sin(angle) * length);
        ctx.stroke();
        ctx.restore();
        
        // 伤害判定
        targets.forEach(e => {
            const dist = pointToLineDistance(e.x, e.y, player.x, player.y, angle, length);
            if (dist < e.radius + w.width / 2) {
                e.hp -= w.damage;
            }
        });
    }

    function pointToLineDistance(px, py, lx, ly, angle, length) {
        const ex = lx + Math.cos(angle) * length;
        const ey = ly + Math.sin(angle) * length;
        const A = px - lx, B = py - ly, C = ex - lx, D = ey - ly;
        const dot = A * C + B * D;
        const len_sq = C * C + D * D;
        let param = dot / len_sq;
        param = Math.max(0, Math.min(1, param));
        const xx = lx + param * C, yy = ly + param * D;
        return getDistance(px, py, xx, yy);
    }

    function fireBlackhole() {
        const w = weapons.blackhole;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        if (enemies.length < 3) return;
        
        // 在敌人密集处生成
        let best = null, maxNearby = 0;
        enemies.forEach(e => {
            let nearby = enemies.filter(o => getDistance(e.x, e.y, o.x, o.y) < 200).length;
            if (nearby > maxNearby) { maxNearby = nearby; best = e; }
        });
        
        if (best) {
            blackholes.push({ x: best.x, y: best.y, radius: w.radius, damage: w.damage, duration: w.duration, hitEnemies: new Set() });
            w.currentCooldown = w.cooldown;
        }
    }

    function fireMeteor() {
        const w = weapons.meteor;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        
        for (let i = 0; i < w.count; i++) {
            const targetX = player.x + randomInRange(-150, 150);
            const targetY = player.y + randomInRange(-150, 150);
            meteors.push({
                x: targetX, y: targetY - 300,
                targetX: Math.max(20, Math.min(canvas.width - 20, targetX)), 
                targetY: Math.max(20, Math.min(canvas.height - 20, targetY)),
                radius: w.radius, damage: w.damage, speed: 8, landed: false
            });
        }
        w.currentCooldown = w.cooldown;
    }

    function updateOrbitals() {
        if (!weapons.orbit.owned) return;
        const w = weapons.orbit;
        orbitals.forEach(orb => {
            orb.angle += w.speed;
            if (orb.hitCooldown > 0) orb.hitCooldown--;
            const ox = player.x + Math.cos(orb.angle) * w.radius;
            const oy = player.y + Math.sin(orb.angle) * w.radius;
            
            ctx.beginPath();
            ctx.arc(ox, oy, 12, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, 12);
            grad.addColorStop(0, 'rgba(100, 200, 255, 0.9)');
            grad.addColorStop(1, 'rgba(50, 150, 255, 0.3)');
            ctx.fillStyle = grad;
            ctx.fill();
            
            if (orb.hitCooldown <= 0) {
                enemies.concat(currentBoss ? [currentBoss] : []).forEach(e => {
                    if (getDistance(ox, oy, e.x, e.y) < 12 + e.radius) {
                        e.hp -= w.damage;
                        orb.hitCooldown = 15;
                    }
                });
            }
        });
    }

    function updateSummons() {
        if (!weapons.summon.owned) return;
        const w = weapons.summon;
        while (summons.length < w.count) spawnSummon();
        
        summons.forEach(s => {
            let targets = [...enemies];
            if (currentBoss) targets.push(currentBoss);
            
            if (!s.targetEnemy || !targets.includes(s.targetEnemy)) {
                let minDist = Infinity;
                targets.forEach(e => {
                    const dist = getDistance(s.x, s.y, e.x, e.y);
                    if (dist < minDist) { minDist = dist; s.targetEnemy = e; }
                });
            }
            
            let tx = player.x, ty = player.y;
            if (s.targetEnemy) { tx = s.targetEnemy.x; ty = s.targetEnemy.y; }
            
            const angle = Math.atan2(ty - s.y, tx - s.x);
            s.x += Math.cos(angle) * w.speed;
            s.y += Math.sin(angle) * w.speed;
            
            // 绘制
            ctx.beginPath();
            ctx.arc(s.x, s.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(180, 100, 255, 0.8)';
            ctx.shadowBlur = 15; ctx.shadowColor = '#aa66ff';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(s.x - 3, s.y - 2, 2, 0, Math.PI * 2);
            ctx.arc(s.x + 3, s.y - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            if (s.attackCooldown > 0) s.attackCooldown--;
            if (s.targetEnemy && s.attackCooldown <= 0 && getDistance(s.x, s.y, s.targetEnemy.x, s.targetEnemy.y) < 25) {
                s.targetEnemy.hp -= w.damage;
                s.attackCooldown = 20;
            }
        });
    }

    function updateExplosions() {
        for (let i = explosions.length - 1; i >= 0; i--) {
            const exp = explosions[i];
            if (exp.radius < exp.maxRadius) exp.radius += exp.maxRadius / 8;
            if (!exp.hasDamaged && exp.radius >= exp.maxRadius * 0.5) {
                enemies.concat(currentBoss ? [currentBoss] : []).forEach(e => {
                    if (getDistance(exp.x, exp.y, e.x, e.y) < exp.maxRadius) {
                        const dmg = calcDamage(exp.damage);
                        e.hp -= dmg.damage;
                    }
                });
                exp.hasDamaged = true;
            }
            const grad = ctx.createRadialGradient(exp.x, exp.y, 0, exp.x, exp.y, exp.radius);
            grad.addColorStop(0, `rgba(255, 200, 50, ${exp.alpha})`);
            grad.addColorStop(0.5, `rgba(255, 100, 50, ${exp.alpha * 0.7})`);
            grad.addColorStop(1, 'rgba(255, 50, 50, 0)');
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            exp.alpha -= 0.04;
            if (exp.alpha <= 0) explosions.splice(i, 1);
        }
    }

    function updateLightnings() {
        for (let i = lightnings.length - 1; i >= 0; i--) {
            const l = lightnings[i];
            ctx.strokeStyle = `rgba(150, 200, 255, ${l.alpha})`;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#88ccff';
            ctx.beginPath();
            for (let j = 0; j < l.chain.length - 1; j++) {
                ctx.moveTo(l.chain[j].x, l.chain[j].y);
                // 锯齿效果
                const mid1x = (l.chain[j].x + l.chain[j+1].x) / 2 + randomInRange(-10, 10);
                const mid1y = (l.chain[j].y + l.chain[j+1].y) / 2 + randomInRange(-10, 10);
                ctx.lineTo(mid1x, mid1y);
                ctx.lineTo(l.chain[j+1].x, l.chain[j+1].y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
            l.alpha -= 0.1;
            if (l.alpha <= 0) lightnings.splice(i, 1);
        }
    }

    function updateBlackholes() {
        for (let i = blackholes.length - 1; i >= 0; i--) {
            const bh = blackholes[i];
            
            // 绘制黑洞
            const grad = ctx.createRadialGradient(bh.x, bh.y, 0, bh.x, bh.y, bh.radius);
            grad.addColorStop(0, 'rgba(0, 0, 0, 0.9)');
            grad.addColorStop(0.5, 'rgba(80, 0, 120, 0.6)');
            grad.addColorStop(1, 'rgba(150, 50, 200, 0)');
            ctx.beginPath();
            ctx.arc(bh.x, bh.y, bh.radius, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            
            // 吸引并伤害敌人
            enemies.forEach(e => {
                const dist = getDistance(bh.x, bh.y, e.x, e.y);
                if (dist < bh.radius * 2) {
                    const angle = Math.atan2(bh.y - e.y, bh.x - e.x);
                    const pull = (bh.radius * 2 - dist) / bh.radius * 2;
                    e.x += Math.cos(angle) * pull;
                    e.y += Math.sin(angle) * pull;
                }
                if (dist < bh.radius && !bh.hitEnemies.has(e)) {
                    e.hp -= bh.damage;
                    bh.hitEnemies.add(e);
                }
            });
            
            bh.duration--;
            if (bh.duration <= 0) blackholes.splice(i, 1);
        }
    }

    function updateMeteors() {
        for (let i = meteors.length - 1; i >= 0; i--) {
            const m = meteors[i];
            
            if (!m.landed) {
                // 下落
                m.y += m.speed;
                
                // 绘制阴影
                ctx.beginPath();
                ctx.ellipse(m.targetX, m.targetY, m.radius * 0.5, m.radius * 0.2, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();
                
                // 绘制陨石
                ctx.beginPath();
                ctx.arc(m.x, m.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6600';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff3300';
                ctx.fill();
                ctx.shadowBlur = 0;
                
                if (m.y >= m.targetY) {
                    m.landed = true;
                    // 爆炸
                    explosions.push({ x: m.targetX, y: m.targetY, radius: 0, maxRadius: m.radius, damage: m.damage, hasDamaged: false, alpha: 1 });
                }
            } else {
                meteors.splice(i, 1);
            }
        }
    }

    // --- 绘制敌人外观 ---

        const bounce = Math.sin(frameCount * 0.1) * 2;

                ctx.fillStyle = e.color; ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(e.x - 3, e.y - 2, 3, 0, Math.PI * 2); ctx.arc(e.x + 3, e.y - 2, 3, 0, Math.PI * 2); ctx.fill();

                ctx.beginPath(); ctx.arc(e.x - 3, e.y - 2, 1.5, 0, Math.PI * 2); ctx.arc(e.x + 3, e.y - 2, 1.5, 0, Math.PI * 2); ctx.fill();
                break;
            case 'skeleton':

                ctx.closePath(); ctx.fill();

                break;
            case 'imp':
                ctx.fillStyle = e.color;

                ctx.beginPath(); ctx.moveTo(e.x - 5, e.y - 6); ctx.lineTo(e.x - 8, e.y - 14); ctx.lineTo(e.x - 2, e.y - 8); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x + 5, e.y - 6); ctx.lineTo(e.x + 8, e.y - 14); ctx.lineTo(e.x + 2, e.y - 8); ctx.fill();
                ctx.fillStyle = '#ffff00';

                break;
            case 'werewolf':
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x - 8, e.y - 8); ctx.lineTo(e.x - 12, e.y - 18); ctx.lineTo(e.x - 4, e.y - 10); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x + 8, e.y - 8); ctx.lineTo(e.x + 12, e.y - 18); ctx.lineTo(e.x + 4, e.y - 10); ctx.fill();
                ctx.fillStyle = '#ff6600';

                ctx.beginPath(); ctx.arc(e.x, e.y - e.radius * 0.5, e.radius * 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#aa44ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#aa44ff';

                ctx.fillRect(e.x - e.radius * 0.4, e.y - e.radius, e.radius * 0.8, e.radius * 0.6);

                ctx.beginPath(); ctx.moveTo(e.x - e.radius * 0.6, e.y + floatY - 5);
                ctx.quadraticCurveTo(e.x - e.radius * 1.2, e.y + floatY + 10, e.x - e.radius * 0.8, e.y + floatY + e.radius);
                ctx.lineTo(e.x + e.radius * 0.8, e.y + floatY + e.radius);
                ctx.quadraticCurveTo(e.x + e.radius * 1.2, e.y + floatY + 10, e.x + e.radius * 0.6, e.y + floatY - 5); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(e.x - 3, e.y + floatY - 6, 2, 0, Math.PI * 2); ctx.arc(e.x + 3, e.y + floatY - 6, 2, 0, Math.PI * 2); ctx.fill();
                break;
            case 'vampire':
                ctx.fillStyle = '#220000';
                ctx.beginPath(); ctx.moveTo(e.x, e.y - e.radius);
                ctx.quadraticCurveTo(e.x - e.radius * 1.5, e.y, e.x - e.radius * 0.8, e.y + e.radius);
                ctx.lineTo(e.x + e.radius * 0.8, e.y + e.radius);
                ctx.quadraticCurveTo(e.x + e.radius * 1.5, e.y, e.x, e.y - e.radius); ctx.fill();
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(e.x, e.y - e.radius * 0.3, e.radius * 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ff0000';
                ctx.beginPath(); ctx.arc(e.x - 3, e.y - e.radius * 0.4, 2, 0, Math.PI * 2); ctx.arc(e.x + 3, e.y - e.radius * 0.4, 2, 0, Math.PI * 2); ctx.fill();
                break;
            case 'necro':
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.moveTo(e.x, e.y - e.radius); ctx.lineTo(e.x + e.radius, e.y + e.radius); ctx.lineTo(e.x - e.radius, e.y + e.radius); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x, e.y - e.radius * 0.4, e.radius * 0.6, Math.PI, 0); ctx.fill();
                ctx.fillStyle = '#00ff00'; ctx.shadowBlur = 8; ctx.shadowColor = '#00ff00';
                ctx.beginPath(); ctx.arc(e.x - 3, e.y - e.radius * 0.3, 2, 0, Math.PI * 2); ctx.arc(e.x + 3, e.y - e.radius * 0.3, 2, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                break;
            case 'dragon':
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.ellipse(e.x, e.y, e.radius, e.radius * 0.7, 0, 0, Math.PI * 2); ctx.fill();
                const dWing = Math.sin(frameCount * 0.15) * 0.3;
                ctx.beginPath(); ctx.moveTo(e.x - 5, e.y - 3);
                ctx.quadraticCurveTo(e.x - 25, e.y - 20 * (1 + dWing), e.x - 20, e.y + 5); ctx.lineTo(e.x - 5, e.y); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.x + 5, e.y - 3);
                ctx.quadraticCurveTo(e.x + 25, e.y - 20 * (1 + dWing), e.x + 20, e.y + 5); ctx.lineTo(e.x + 5, e.y); ctx.fill();
                ctx.beginPath(); ctx.ellipse(e.x, e.y - e.radius * 0.5, e.radius * 0.5, e.radius * 0.4, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffff00';

                break;

                ctx.fillStyle = '#aaaaaa'; ctx.fillRect(e.x + e.radius * 0.5, e.y - e.radius, 4, e.radius * 1.5);
                ctx.strokeStyle = 'rgba(100, 0, 150, 0.3)'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius * 2, 0, Math.PI * 2); ctx.stroke();
                break;
            default:
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color; ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.arc(e.x - 3, e.y - 2, 2, 0, Math.PI * 2); ctx.arc(e.x + 3, e.y - 2, 2, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }

    // --- 敌人行为更新 ---
    function updateEnemyBehavior(e) {
        e.behaviorTimer++;
        const dist = getDistance(player.x, player.y, e.x, e.y);
        const baseAngle = Math.atan2(player.y - e.y, player.x - e.x);
        
        switch(e.behavior) {
            case 'normal': case 'tank': case 'lifesteal':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                break;
            case 'zigzag':
                const zigzag = Math.sin(e.behaviorTimer * 0.1) * 0.8;
                e.x += Math.cos(baseAngle + zigzag) * e.speed; e.y += Math.sin(baseAngle + zigzag) * e.speed;
                break;
            case 'swoop':
                if (e.phase === 0) {
                    const circleAngle = e.behaviorTimer * 0.05;
                    const tx = player.x + Math.cos(circleAngle) * 150, ty = player.y + Math.sin(circleAngle) * 150;
                    const toTarget = Math.atan2(ty - e.y, tx - e.x);
                    e.x += Math.cos(toTarget) * e.speed; e.y += Math.sin(toTarget) * e.speed;
                    if (e.behaviorTimer % 120 === 0 && Math.random() < 0.5) { e.phase = 1; e.targetX = player.x; e.targetY = player.y; }
                } else {
                    const swoopAngle = Math.atan2(e.targetY - e.y, e.targetX - e.x);
                    e.x += Math.cos(swoopAngle) * e.speed * 2; e.y += Math.sin(swoopAngle) * e.speed * 2;
                    if (getDistance(e.x, e.y, e.targetX, e.targetY) < 20) e.phase = 0;
                }
                break;
            case 'phase':
                e.alpha = 0.5 + Math.sin(e.behaviorTimer * 0.1) * 0.3;
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                if (e.behaviorTimer % 180 === 0) { e.x += (Math.random() - 0.5) * 80; e.y += (Math.random() - 0.5) * 80; }
                break;
            case 'dash':
                if (e.phase === 0) {
                    e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                    if (e.behaviorTimer % 90 === 0 && dist < 200) { e.phase = 1; e.dashAngle = baseAngle; e.dashTimer = 15; }
                } else {
                    e.x += Math.cos(e.dashAngle) * e.speed * 3; e.y += Math.sin(e.dashAngle) * e.speed * 3;
                    e.dashTimer--; if (e.dashTimer <= 0) e.phase = 0;
                }
                break;
            case 'charge':
                if (e.phase === 0) {
                    e.x += Math.cos(baseAngle) * e.speed * 0.5; e.y += Math.sin(baseAngle) * e.speed * 0.5;
                    if (e.behaviorTimer % 150 === 0 && dist < 250) { e.phase = 1; e.chargeTimer = 30; }
                } else if (e.phase === 1) {
                    e.chargeTimer--;
                    ctx.strokeStyle = 'rgba(255, 100, 0, 0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 5 + (30 - e.chargeTimer), 0, Math.PI * 2); ctx.stroke();
                    if (e.chargeTimer <= 0) { e.phase = 2; e.chargeAngle = baseAngle; e.chargeTimer = 20; }
                } else {
                    e.x += Math.cos(e.chargeAngle) * e.speed * 4; e.y += Math.sin(e.chargeAngle) * e.speed * 4;
                    e.chargeTimer--; if (e.chargeTimer <= 0) e.phase = 0;
                }
                break;
            case 'ranged':
                if (dist > 200) { e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed; }
                else if (dist < 150) { e.x -= Math.cos(baseAngle) * e.speed * 0.5; e.y -= Math.sin(baseAngle) * e.speed * 0.5; }
                if (e.behaviorTimer % 90 === 0 && dist < 350) {
                    enemyProjectiles.push({ x: e.x, y: e.y, vx: Math.cos(baseAngle) * 4, vy: Math.sin(baseAngle) * 4, radius: 6, color: '#aa44ff', damage: 10 });
                }
                break;
            case 'scream':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                if (e.behaviorTimer % 180 === 0 && dist < 150) {
                    ctx.strokeStyle = 'rgba(170, 220, 255, 0.5)'; ctx.lineWidth = 3;
                    for (let r = 20; r < 100; r += 20) { ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI * 2); ctx.stroke(); }
                }
                break;
            case 'summon':
                if (dist > 250) { e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed; }
                if (e.behaviorTimer % 240 === 0 && enemies.length < 50) {
                    for (let i = 0; i < 2; i++) {
                        const type = enemyTypes.skeleton;
                        enemies.push({ x: e.x + randomInRange(-30, 30), y: e.y + randomInRange(-30, 30), radius: type.radius, speed: type.baseSpeed, baseSpeed: type.baseSpeed, hp: type.baseHp, maxHp: type.baseHp, color: type.color, type: 'skeleton', behavior: 'zigzag', shape: 'skeleton', expDrop: 1, behaviorTimer: 0, phase: 0, alpha: 1, dashAngle: 0, dashTimer: 0, chargeAngle: 0, chargeTimer: 0 });
                    }
                }
                break;
            case 'breath':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                if (e.behaviorTimer % 120 === 0 && dist < 300) {
                    for (let i = -2; i <= 2; i++) {
                        const breathAngle = baseAngle + i * 0.15;
                        enemyProjectiles.push({ x: e.x, y: e.y, vx: Math.cos(breathAngle) * 5, vy: Math.sin(breathAngle) * 5, radius: 8, color: '#ff4400', damage: 8, life: 60 });
                    }
                }
                break;
            case 'aura':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                enemies.forEach(other => { if (other !== e && getDistance(e.x, e.y, other.x, other.y) < 100) other.speed = other.baseSpeed * 1.3; });
                break;
        }
        e.x = Math.max(e.radius, Math.min(canvas.width - e.radius, e.x));
        e.y = Math.max(e.radius, Math.min(canvas.height - e.radius, e.y));
    }

    // --- 更新敌人投射物 ---
    function updateEnemyProjectiles() {
        for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
            const p = enemyProjectiles[i];
            p.x += p.vx; p.y += p.vy;
            if (p.life !== undefined) { p.life--; if (p.life <= 0) { enemyProjectiles.splice(i, 1); continue; } }
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color; ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fill(); ctx.shadowBlur = 0;
            if (getDistance(player.x, player.y, p.x, p.y) < player.radius + p.radius) {
                player.hp -= p.damage; hpEl.innerText = Math.max(0, Math.floor(player.hp));
                enemyProjectiles.splice(i, 1); continue;
            }
            if (p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50) enemyProjectiles.splice(i, 1);
        }
    }

    function updateBoss() {
        if (!currentBoss) return;
        const b = currentBoss;
        
        // 移动向玩家
        const angle = Math.atan2(player.y - b.y, player.x - b.x);
        b.x += Math.cos(angle) * b.speed;
        b.y += Math.sin(angle) * b.speed;
        
        // Boss 特殊攻击
        b.actionTimer++;
        if (b.pattern === 'charge' && b.actionTimer % 120 === 0) {
            b.speed = 4; // 冲刺
            setTimeout(() => { if (currentBoss) currentBoss.speed = 1.2; }, 500);
        }
        if (b.pattern === 'summon' && b.actionTimer % 180 === 0) {
            for (let i = 0; i < 3; i++) spawnEnemy();
        }
        
        // 绘制 Boss
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.shadowBlur = 30;
        ctx.shadowColor = b.color;
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Boss 眼睛
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(b.x - 10, b.y - 5, 6, 0, Math.PI * 2);
        ctx.arc(b.x + 10, b.y - 5, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(b.x - 10, b.y - 5, 3, 0, Math.PI * 2);
        ctx.arc(b.x + 10, b.y - 5, 3, 0, Math.PI * 2);
        ctx.fill();
        
        // 更新血条
        bossBar.style.width = (b.hp / b.maxHp) * 100 + '%';
        
        // 碰撞玩家
        if (getDistance(player.x, player.y, b.x, b.y) < player.radius + b.radius) {
            player.hp -= 1;
            hpEl.innerText = Math.max(0, Math.floor(player.hp));
        }
        
        // Boss 死亡
        if (b.hp <= 0) {
            for (let i = 0; i < 10; i++) {
                gems.push({ x: b.x + randomInRange(-30, 30), y: b.y + randomInRange(-30, 30), val: b.expDrop / 10 });
            }
            bossDefeated++;
            score += 50;
            scoreEl.innerText = score;
            currentBoss = null;
            bossBarContainer.style.display = 'none';
        }
    }

    function gainExp(amount) {
        player.exp += amount * player.expBonus;
        if (player.exp >= player.maxExp) {
            player.level++;
            player.exp -= player.maxExp;
            player.maxExp = Math.floor(player.maxExp * 1.35);
            levelEl.innerText = player.level;
            triggerLevelUp();
        }
        expBar.style.width = (player.exp / player.maxExp) * 100 + '%';
    }

    function triggerLevelUp() {
        isPaused = true;
        levelUpMenu.style.display = 'block';
        cardsContainer.innerHTML = '';
        
        const pool = getUpgradePool();
        let shuffled = pool.sort(() => 0.5 - Math.random());
        shuffled.sort((a, b) => {
            if (a.isSpecial && !b.isSpecial) return -1;
            if (!a.isSpecial && b.isSpecial) return 1;
            if (a.isNew && !b.isNew) return -1;
            if (!a.isNew && b.isNew) return 1;
            return 0;
        });
        let choices = shuffled.slice(0, player.upgradeChoices);

        choices.forEach(choice => {
            const card = document.createElement('div');
            card.className = 'card' + (choice.isNew ? ' card-new' : '') + (choice.isSpecial ? ' card-special' : '');
            card.innerHTML = `<div class="type">${choice.type || ''}</div><h3>${choice.name}</h3><p>${choice.desc}</p>`;
            card.onclick = () => {
                choice.apply();
                levelUpMenu.style.display = 'none';
                isPaused = false;
                gameLoop();
            };
            cardsContainer.appendChild(card);
        });
    }

    function updateWeaponDisplay() {
        let display = '';
        Object.entries(weapons).forEach(([key, w]) => {
            if (w.owned) display += `${w.icon}${w.name[0]}${w.level} `;
        });
        weaponListEl.innerHTML = display || '无';
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- 主循环 ---
    function gameLoop() {
        if (isGameOver || isPaused) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frameCount++;
        
        // 更新游戏时间
        if (frameCount % 60 === 0) {
            gameTime++;
            timerEl.innerText = formatTime(gameTime);
            
            // HP回复天赋
            if (player.hpRegen > 0) {
                player.hp = Math.min(player.maxHp, player.hp + player.hpRegen);
                hpEl.innerText = Math.floor(player.hp);
            }
            
            // 新敌人类型解锁通知
            Object.entries(enemyTypes).forEach(([key, type]) => {
                if (gameTime === type.unlock && type.unlock > 0) {
                    showWaveNotice(`⚠️ 新敌人出现: ${type.name}!`);
                }
            });
            
            // Boss 生成（每60秒）
            if (gameTime > 0 && gameTime % 60 === 0 && !currentBoss) {
                spawnBoss();
            }
        }

        // 玩家移动（键盘 + 虚拟摇杆）
        let moveX = 0, moveY = 0;
        
        // 键盘输入
        if (keys.w) moveY -= 1;
        if (keys.s) moveY += 1;
        if (keys.a) moveX -= 1;
        if (keys.d) moveX += 1;
        
        // 虚拟摇杆输入（优先级更高）
        if (joystickActive && (Math.abs(joystickInput.x) > 0.1 || Math.abs(joystickInput.y) > 0.1)) {
            moveX = joystickInput.x;
            moveY = joystickInput.y;
        }
        
        // 标准化对角移动
        const moveLength = Math.hypot(moveX, moveY);
        if (moveLength > 0) {
            moveX = moveX / moveLength;
            moveY = moveY / moveLength;
        }
        
        // 应用移动
        const newX = player.x + moveX * player.speed;
        const newY = player.y + moveY * player.speed;
        if (newX > player.radius && newX < canvas.width - player.radius) player.x = newX;
        if (newY > player.radius && newY < canvas.height - player.radius) player.y = newY;

        // 所有武器
        fireBullets();
        fireExplosion();
        fireLightning();
        fireLaser();
        fireBlackhole();
        fireMeteor();
        updateOrbitals();
        updateSummons();
        updateExplosions();
        updateLightnings();
        updateBlackholes();
        updateMeteors();
        updateEnemyProjectiles();

        // 刷怪
        const spawnRate = Math.max(10, 45 - Math.floor(gameTime / 10));
        if (frameCount % spawnRate === 0) spawnEnemy();

        // 绘制拾取范围
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.pickupRange, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 229, 255, 0.05)';
        ctx.fill();

        // 绘制玩家
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        // 狂战士模式视觉效果
        if (player.berserker && player.hp < player.maxHp * 0.5) {
            const rage = 1 - (player.hp / player.maxHp);
            player.color = `rgb(${Math.floor(255 * rage)}, ${Math.floor(229 * (1 - rage))}, ${Math.floor(255 * (1 - rage))})`;
            ctx.shadowBlur = 20 + rage * 20;
            ctx.shadowColor = '#ff0000';
        } else {
            player.color = '#00e5ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
        }
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.shadowBlur = 0;

        // 经验宝石
        for (let i = gems.length - 1; i >= 0; i--) {
            let g = gems[i];
            const dist = getDistance(player.x, player.y, g.x, g.y);
            if (dist < player.pickupRange) {
                const angle = Math.atan2(player.y - g.y, player.x - g.x);
                g.x += Math.cos(angle) * 8;
                g.y += Math.sin(angle) * 8;
            }
            if (dist < player.radius + 5) { gainExp(g.val); gems.splice(i, 1); continue; }
            ctx.beginPath();
            ctx.arc(g.x, g.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffaa';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00ffaa';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 子弹
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffff00';
            ctx.fill();
            if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) bullets.splice(i, 1);
        }

        // 敌人
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            
            // 使用行为系统更新敌人移动
            updateEnemyBehavior(e);
            
            // 使用外观系统绘制敌人
            drawEnemy(e);
            
            // 血条
            if (e.hp < e.maxHp) {
                ctx.fillStyle = '#333';
                ctx.fillRect(e.x - 15, e.y - 20, 30, 4);
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x - 15, e.y - 20, 30 * (e.hp / e.maxHp), 4);
            }
            
            // 死亡处理
            if (e.hp <= 0) {
                gems.push({ x: e.x, y: e.y, val: e.expDrop || 2 });
                enemies.splice(i, 1);
                score++;
                scoreEl.innerText = score;
                // 击杀回血天赋
                if (player.lifestealOnKill > 0) {
                    player.hp = Math.min(player.maxHp, player.hp + player.lifestealOnKill);
                    hpEl.innerText = Math.floor(player.hp);
                }
                continue;
            }
            
            // 碰撞玩家
            // 碰撞玩家
            if (getDistance(player.x, player.y, e.x, e.y) < player.radius + e.radius) {
                // 闪避检测
                if (player.dodgeChance > 0 && Math.random() < player.dodgeChance) {
                    // 闪避成功，显示效果
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.fillText('闪避!', player.x, player.y - 30);
                } else {
                    player.hp -= 0.5;
                    // 吸血鬼吸血
                    if (e.behavior === 'lifesteal') {
                        e.hp = Math.min(e.maxHp, e.hp + 0.3);
                    }
                    hpEl.innerText = Math.max(0, Math.floor(player.hp));
                }
                if (player.hp <= 0) {
                    // 复活天赋
                    if (player.revive && !player.reviveUsed) {
                        player.reviveUsed = true;
                        player.hp = player.maxHp * 0.5;
                        hpEl.innerText = Math.floor(player.hp);
                        showWaveNotice('🔥 凤凰涅槃！');
                    } else {
                        isGameOver = true;
                        const talentNames = activeTalents.map(t => t.name).join(', ') || '无';
                        alert(`💀 被击溃！\n存活时间: ${formatTime(gameTime)}\n等级: Lv.${player.level}\n击杀: ${score}\nBoss击败: ${bossDefeated}\n天赋: ${talentNames}`);
                        location.reload();
                    }
                }
            }
            
            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (!b.hitEnemies.has(e) && getDistance(e.x, e.y, b.x, b.y) < e.radius + b.radius) {
                    // 秒杀天赋（只对非Boss生效）
                    if (player.instakillChance > 0 && Math.random() < player.instakillChance) {
                        e.hp = 0;
                    } else {
                        const dmg = calcDamage(b.damage);
                        e.hp -= dmg.damage;
                    }
                    b.hitEnemies.add(e);
                    b.pierceLeft--;
                    if (b.pierceLeft <= 0) bullets.splice(j, 1);
                }
            }
        }

        // Boss
        updateBoss();
        
        // Boss 受弹判定
        if (currentBoss) {
            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (!b.hitEnemies.has(currentBoss) && getDistance(currentBoss.x, currentBoss.y, b.x, b.y) < currentBoss.radius + b.radius) {
                    const dmg = calcDamage(b.damage, true); // Boss伤害加成
                    currentBoss.hp -= dmg.damage;
                    b.hitEnemies.add(currentBoss);
                    b.pierceLeft--;
                    if (b.pierceLeft <= 0) bullets.splice(j, 1);
                }
            }
        }

        // 敌人统计
        if (frameCount % 30 === 0) {
            const types = {};
            enemies.forEach(e => { types[e.type] = (types[e.type] || 0) + 1; });
            let stats = '敌人: ';
            Object.entries(types).slice(0, 5).forEach(([type, count]) => {
                const t = enemyTypes[type];
                if (t) stats += `${t.name}×${count} `;
            });
            if (Object.keys(types).length > 5) stats += '...';
            enemyStatsEl.innerText = stats;
        }

        requestAnimationFrame(gameLoop);
    }

    updateWeaponDisplay();
    // 游戏在选择天赋后启动
</script>
</body>
</html>
