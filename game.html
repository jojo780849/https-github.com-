                else { w.damage += 10; w.cooldown = Math.max(15, w.cooldown * 0.85); }
            }},
            orbit: { desc: !w.owned ? '获得2个环绕护盾' : '护盾+1，伤害+5', apply: () => {
                if (!w.owned) { w.owned = true; initOrbitals(); }
                w.level++; w.count++; w.damage += 5; w.radius += 8; initOrbitals();
            }},
            explosion: { desc: !w.owned ? '周期性范围爆炸' : '伤害+25，范围+15', apply: () => {
                w.owned = true; w.level++; w.damage += 25; w.radius += 15; w.cooldown = Math.max(60, w.cooldown * 0.9);
            }},
            summon: { desc: !w.owned ? '召唤1个幽灵' : '召唤物+1，伤害+8', apply: () => {
                if (!w.owned) { w.owned = true; spawnSummon(); }
                w.level++; w.count++; w.damage += 8; w.speed += 0.5;
                while (summons.length < w.count) spawnSummon();
            }},
            lightning: { desc: !w.owned ? '释放连锁闪电' : '伤害+30，连锁+1', apply: () => {
                w.owned = true; w.level++; w.damage += 30; w.chains++; w.cooldown = Math.max(50, w.cooldown - 10);
            }},
            laser: { desc: !w.owned ? '持续射线攻击' : '伤害+1，宽度+3', apply: () => {
                w.owned = true; w.level++; w.damage += 1; w.width += 3;
            }},
            blackhole: { desc: !w.owned ? '生成黑洞吸引敌人' : '伤害+50，范围+20', apply: () => {
                w.owned = true; w.level++; w.damage += 50; w.radius += 20; w.duration += 30;
            }},
            meteor: { desc: !w.owned ? '召唤陨石轰炸' : '陨石+1，伤害+30', apply: () => {
                w.owned = true; w.level++; w.damage += 30; w.count++;
            }}
        };

        const u = upgrades[key];
        return {
            name: w.name, type: w.owned ? `Lv.${w.level + 1}` : '新武器',
            desc: u.desc, isNew: !w.owned, isSpecial,
            apply: () => { u.apply(); updateWeaponDisplay(); }
        };
    }

    function initOrbitals() {
        orbitals = [];
        for (let i = 0; i < weapons.orbit.count; i++) {
            orbitals.push({ angle: (Math.PI * 2 / weapons.orbit.count) * i, hitCooldown: 0 });
        }
    }

    function spawnSummon() {
        summons.push({ x: player.x, y: player.y, targetEnemy: null, attackCooldown: 0 });
    }

    // 显示波次通知
    function showWaveNotice(text) {
        waveNotice.innerText = text;
        waveNotice.style.display = 'block';
        setTimeout(() => { waveNotice.style.display = 'none'; }, 2000);
    }

    // 选择敌人类型
    function selectEnemyType() {
        const available = Object.entries(enemyTypes).filter(([k, t]) => gameTime >= t.unlock);
        const totalWeight = available.reduce((sum, [k, t]) => sum + t.weight, 0);
        let random = Math.random() * totalWeight;
        for (const [key, type] of available) {
            random -= type.weight;
            if (random <= 0) return { key, ...type };
        }
        return { key: 'slime', ...enemyTypes.slime };
    }

    function spawnEnemy() {
        const type = selectEnemyType();
        let x, y;
        if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -30 : canvas.width + 30; y = Math.random() * canvas.height; }
        else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -30 : canvas.height + 30; }
        const hpMult = 1 + (gameTime * 0.01) + (player.level * 0.1);
        const speedMult = (1 + (gameTime * 0.002)) * player.slowEnemies; // 应用减速天赋
        enemies.push({
            x, y, radius: type.radius, speed: type.baseSpeed * speedMult, baseSpeed: type.baseSpeed * speedMult,
            hp: type.baseHp * hpMult, maxHp: type.baseHp * hpMult, color: type.color, type: type.key,
            behavior: type.behavior, shape: type.shape, expDrop: type.expDrop,
            behaviorTimer: 0, phase: 0, alpha: 1, dashAngle: 0, dashTimer: 0, chargeAngle: 0, chargeTimer: 0
        });
    }

    function calcDamage(baseDamage, isBoss = false) {
        let damage = baseDamage * player.damageBonus;
        // 狂战士：HP越低伤害越高
        if (player.berserker) {
            const hpPercent = player.hp / player.maxHp;
            damage *= 1 + (1 - hpPercent); // 最高 +100%
        }
        // Boss 伤害加成
        if (isBoss) damage *= player.bossDamageBonus;
        // 暴击
        if (Math.random() < player.critChance) {
            return { damage: damage * player.critDamage, crit: true };
        }
        return { damage, crit: false };
    }

    // --- 武器逻辑 ---
    function fireBullets() {
        const w = weapons.bullet;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        let nearest = null, minDist = w.range;
        enemies.concat(currentBoss ? [currentBoss] : []).forEach(e => {
            const dist = getDistance(player.x, player.y, e.x, e.y);
            if (dist < minDist) { minDist = dist; nearest = e; }
        });
        if (nearest) {
            const baseAngle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
            // 让角色面向敌人（设置目标角度）
            player.targetAngle = baseAngle;
            // 触发攻击动画
            triggerAttackAnimation();
            
            for (let i = 0; i < w.count; i++) {
                const offset = (i - (w.count - 1) / 2) * 0.15;
                const angle = baseAngle + offset;
                bullets.push({ x: player.x, y: player.y, radius: 5 * player.bulletSizeBonus, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10, damage: w.damage, pierceLeft: w.pierce, hitEnemies: new Set() });
            }
            w.currentCooldown = w.cooldown;
        }
    }

    function fireExplosion() {
        const w = weapons.explosion;
        if (!w.owned) return;
        if (w.currentCooldown > 0) { w.currentCooldown--; return; }
        let best = null, maxNearby = 0;
        enemies.forEach(e => {
            let nearby = enemies.filter(o => getDistance(e.x, e.y, o.x, o.y) < w.radius).length;
            if (nearby > maxNearby) { maxNearby = nearby; best = e; }
        });
        if (best) {
            explosions.push({ x: best.x, y: best.y, radius: 0, maxRadius: w.radius, damage: w.damage, hasDamaged: false, alpha: 1 });
            w.currentCooldown = w.cooldown;
        }
    }

    function fireLightning() {
        const w = weapons.lightning;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        if (enemies.length === 0 && !currentBoss) return;
        
        let targets = [...enemies];
        if (currentBoss) targets.push(currentBoss);
        targets.sort((a, b) => getDistance(player.x, player.y, a.x, a.y) - getDistance(player.x, player.y, b.x, b.y));
        
        if (targets.length > 0) {
            let chain = [{ x: player.x, y: player.y }];
            let hit = new Set();
            for (let i = 0; i < w.chains && targets.length > 0; i++) {
                let last = chain[chain.length - 1];
                let nearest = null, minDist = 300;
                targets.forEach(t => {
                    if (!hit.has(t)) {
                        const dist = getDistance(last.x, last.y, t.x, t.y);
                        if (dist < minDist) { minDist = dist; nearest = t; }
                    }
                });
                if (nearest) {
                    chain.push({ x: nearest.x, y: nearest.y, target: nearest });
                    hit.add(nearest);
                    const dmg = calcDamage(w.damage);
                    nearest.hp -= dmg.damage;
                }
            }
            lightnings.push({ chain, alpha: 1 });
            w.currentCooldown = w.cooldown;
        }
    }

    function fireLaser() {
        const w = weapons.laser;
        if (!w.owned) return;
        
        let targets = [...enemies];
        if (currentBoss) targets.push(currentBoss);
        if (targets.length === 0) return;
        
        targets.sort((a, b) => getDistance(player.x, player.y, a.x, a.y) - getDistance(player.x, player.y, b.x, b.y));
        const target = targets[0];
        const angle = Math.atan2(target.y - player.y, target.x - player.x);
        const length = 500;
        
        // 绘制激光
        ctx.save();
        ctx.strokeStyle = `rgba(255, 50, 50, 0.8)`;
        ctx.lineWidth = w.width;
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0000';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(player.x + Math.cos(angle) * length, player.y + Math.sin(angle) * length);
        ctx.stroke();
        ctx.restore();
        
        // 伤害判定
        targets.forEach(e => {
            const dist = pointToLineDistance(e.x, e.y, player.x, player.y, angle, length);
            if (dist < e.radius + w.width / 2) {
                e.hp -= w.damage;
            }
        });
    }

    function pointToLineDistance(px, py, lx, ly, angle, length) {
        const ex = lx + Math.cos(angle) * length;
        const ey = ly + Math.sin(angle) * length;
        const A = px - lx, B = py - ly, C = ex - lx, D = ey - ly;
        const dot = A * C + B * D;
        const len_sq = C * C + D * D;
        let param = dot / len_sq;
        param = Math.max(0, Math.min(1, param));
        const xx = lx + param * C, yy = ly + param * D;
        return getDistance(px, py, xx, yy);
    }

    function fireBlackhole() {
        const w = weapons.blackhole;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        if (enemies.length < 3) return;
        
        // 在敌人密集处生成
        let best = null, maxNearby = 0;
        enemies.forEach(e => {
            let nearby = enemies.filter(o => getDistance(e.x, e.y, o.x, o.y) < 200).length;
            if (nearby > maxNearby) { maxNearby = nearby; best = e; }
        });
        
        if (best) {
            blackholes.push({ x: best.x, y: best.y, radius: w.radius, damage: w.damage, duration: w.duration, hitEnemies: new Set() });
            w.currentCooldown = w.cooldown;
        }
    }

    function fireMeteor() {
        const w = weapons.meteor;
        if (!w.owned || w.currentCooldown > 0) { w.currentCooldown--; return; }
        
        for (let i = 0; i < w.count; i++) {
            const targetX = player.x + randomInRange(-150, 150);
            const targetY = player.y + randomInRange(-150, 150);
            meteors.push({
                x: targetX, y: targetY - 300,
                targetX: Math.max(20, Math.min(canvas.width - 20, targetX)), 
                targetY: Math.max(20, Math.min(canvas.height - 20, targetY)),
                radius: w.radius, damage: w.damage, speed: 8, landed: false
            });
        }
        w.currentCooldown = w.cooldown;
    }

    function updateOrbitals() {
        if (!weapons.orbit.owned) return;
        const w = weapons.orbit;
        orbitals.forEach(orb => {
            orb.angle += w.speed;
            if (orb.hitCooldown > 0) orb.hitCooldown--;
            const ox = player.x + Math.cos(orb.angle) * w.radius;
            const oy = player.y + Math.sin(orb.angle) * w.radius;
            
            ctx.beginPath();
            ctx.arc(ox, oy, 12, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, 12);
            grad.addColorStop(0, 'rgba(100, 200, 255, 0.9)');
            grad.addColorStop(1, 'rgba(50, 150, 255, 0.3)');
            ctx.fillStyle = grad;
            ctx.fill();
            
            if (orb.hitCooldown <= 0) {
                enemies.concat(currentBoss ? [currentBoss] : []).forEach(e => {
                    if (getDistance(ox, oy, e.x, e.y) < 12 + e.radius) {
                        e.hp -= w.damage;
                        orb.hitCooldown = 15;
                    }
                });
            }
        });
    }

    function updateSummons() {
        if (!weapons.summon.owned) return;
        const w = weapons.summon;
        while (summons.length < w.count) spawnSummon();
        
        summons.forEach(s => {
            let targets = [...enemies];
            if (currentBoss) targets.push(currentBoss);
            
            if (!s.targetEnemy || !targets.includes(s.targetEnemy)) {
                let minDist = Infinity;
                targets.forEach(e => {
                    const dist = getDistance(s.x, s.y, e.x, e.y);
                    if (dist < minDist) { minDist = dist; s.targetEnemy = e; }
                });
            }
            
            let tx = player.x, ty = player.y;
            if (s.targetEnemy) { tx = s.targetEnemy.x; ty = s.targetEnemy.y; }
            
            const angle = Math.atan2(ty - s.y, tx - s.x);
            s.x += Math.cos(angle) * w.speed;
            s.y += Math.sin(angle) * w.speed;
            
            // 绘制
            ctx.beginPath();
            ctx.arc(s.x, s.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(180, 100, 255, 0.8)';
            ctx.shadowBlur = 15; ctx.shadowColor = '#aa66ff';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(s.x - 3, s.y - 2, 2, 0, Math.PI * 2);
            ctx.arc(s.x + 3, s.y - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            if (s.attackCooldown > 0) s.attackCooldown--;
            if (s.targetEnemy && s.attackCooldown <= 0 && getDistance(s.x, s.y, s.targetEnemy.x, s.targetEnemy.y) < 25) {
                s.targetEnemy.hp -= w.damage;
                s.attackCooldown = 20;
            }
        });
    }

    function updateExplosions() {
        for (let i = explosions.length - 1; i >= 0; i--) {
            const exp = explosions[i];
            if (exp.radius < exp.maxRadius) exp.radius += exp.maxRadius / 8;
            if (!exp.hasDamaged && exp.radius >= exp.maxRadius * 0.5) {
                enemies.concat(currentBoss ? [currentBoss] : []).forEach(e => {
                    if (getDistance(exp.x, exp.y, e.x, e.y) < exp.maxRadius) {
                        const dmg = calcDamage(exp.damage);
                        e.hp -= dmg.damage;
                    }
                });
                exp.hasDamaged = true;
            }
            const grad = ctx.createRadialGradient(exp.x, exp.y, 0, exp.x, exp.y, exp.radius);
            grad.addColorStop(0, `rgba(255, 200, 50, ${exp.alpha})`);
            grad.addColorStop(0.5, `rgba(255, 100, 50, ${exp.alpha * 0.7})`);
            grad.addColorStop(1, 'rgba(255, 50, 50, 0)');
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            exp.alpha -= 0.04;
            if (exp.alpha <= 0) explosions.splice(i, 1);
        }
    }

    function updateLightnings() {
        for (let i = lightnings.length - 1; i >= 0; i--) {
            const l = lightnings[i];
            ctx.strokeStyle = `rgba(150, 200, 255, ${l.alpha})`;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#88ccff';
            ctx.beginPath();
            for (let j = 0; j < l.chain.length - 1; j++) {
                ctx.moveTo(l.chain[j].x, l.chain[j].y);
                // 锯齿效果
                const mid1x = (l.chain[j].x + l.chain[j+1].x) / 2 + randomInRange(-10, 10);
                const mid1y = (l.chain[j].y + l.chain[j+1].y) / 2 + randomInRange(-10, 10);
                ctx.lineTo(mid1x, mid1y);
                ctx.lineTo(l.chain[j+1].x, l.chain[j+1].y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
            l.alpha -= 0.1;
            if (l.alpha <= 0) lightnings.splice(i, 1);
        }
    }

    function updateBlackholes() {
        for (let i = blackholes.length - 1; i >= 0; i--) {
            const bh = blackholes[i];
            
            // 绘制黑洞
            const grad = ctx.createRadialGradient(bh.x, bh.y, 0, bh.x, bh.y, bh.radius);
            grad.addColorStop(0, 'rgba(0, 0, 0, 0.9)');
            grad.addColorStop(0.5, 'rgba(80, 0, 120, 0.6)');
            grad.addColorStop(1, 'rgba(150, 50, 200, 0)');
            ctx.beginPath();
            ctx.arc(bh.x, bh.y, bh.radius, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            
            // 吸引并伤害敌人
            enemies.forEach(e => {
                const dist = getDistance(bh.x, bh.y, e.x, e.y);
                if (dist < bh.radius * 2) {
                    const angle = Math.atan2(bh.y - e.y, bh.x - e.x);
                    const pull = (bh.radius * 2 - dist) / bh.radius * 2;
                    e.x += Math.cos(angle) * pull;
                    e.y += Math.sin(angle) * pull;
                }
                if (dist < bh.radius && !bh.hitEnemies.has(e)) {
                    e.hp -= bh.damage;
                    bh.hitEnemies.add(e);
                }
            });
            
            bh.duration--;
            if (bh.duration <= 0) blackholes.splice(i, 1);
        }
    }

    function updateMeteors() {
        for (let i = meteors.length - 1; i >= 0; i--) {
            const m = meteors[i];
            
            if (!m.landed) {
                // 下落
                m.y += m.speed;
                
                // 绘制阴影
                ctx.beginPath();
                ctx.ellipse(m.targetX, m.targetY, m.radius * 0.5, m.radius * 0.2, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();
                
                // 绘制陨石
                ctx.beginPath();
                ctx.arc(m.x, m.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6600';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff3300';
                ctx.fill();
                ctx.shadowBlur = 0;
                
                if (m.y >= m.targetY) {
                    m.landed = true;
                    // 爆炸
                    explosions.push({ x: m.targetX, y: m.targetY, radius: 0, maxRadius: m.radius, damage: m.damage, hasDamaged: false, alpha: 1 });
                }
            } else {
                meteors.splice(i, 1);
            }
        }
    }

    // --- 绘制敌人外观（新版：蛋壳怪、瓢虫等）---
    function drawEnemy(e) {
        ctx.save();
        ctx.globalAlpha = e.alpha || 1;
        const bounce = Math.sin(frameCount * 0.1 + e.x * 0.1) * 2;
        const floatY = Math.sin(frameCount * 0.05 + e.y * 0.1) * 3;
        
        switch(e.shape) {
            case 'eggshell':
                // 蛋壳怪：白色蛋壳，红色眼睛，锯齿嘴
                // 阴影
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius - 2, e.radius * 0.8, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                
                // 蛋壳主体
                ctx.fillStyle = '#fff8f0';
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 1.1, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 蛋壳裂缝顶部（锯齿状）
                ctx.fillStyle = '#fff8f0';
                ctx.beginPath();
                ctx.moveTo(e.x - e.radius + 2, e.y - e.radius * 0.3);
                for (let i = 0; i < 5; i++) {
                    const zigX = e.x - e.radius + 4 + i * (e.radius * 0.4);
                    const zigY = e.y - e.radius * 0.3 + ((i % 2) ? -4 : 0);
                    ctx.lineTo(zigX, zigY);
                }
                ctx.lineTo(e.x + e.radius - 2, e.y - e.radius * 0.3);
                ctx.lineTo(e.x + e.radius - 2, e.y - e.radius * 0.8);
                ctx.quadraticCurveTo(e.x, e.y - e.radius * 1.2, e.x - e.radius + 2, e.y - e.radius * 0.8);
                ctx.closePath();
                ctx.fill();
                
                // 蛋壳内部黑色（嘴）
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.moveTo(e.x - e.radius + 4, e.y - e.radius * 0.2);
                for (let i = 0; i < 5; i++) {
                    const zigX = e.x - e.radius + 6 + i * (e.radius * 0.35);
                    const zigY = e.y - e.radius * 0.2 + ((i % 2) ? -5 : 2);
                    ctx.lineTo(zigX, zigY);
                }
                ctx.lineTo(e.x + e.radius - 4, e.y - e.radius * 0.2);
                ctx.lineTo(e.x + e.radius - 4, e.y + 2);
                ctx.lineTo(e.x - e.radius + 4, e.y + 2);
                ctx.closePath();
                ctx.fill();
                
                // 红色眼睛
                ctx.fillStyle = '#cc0000';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ff0000';
                ctx.beginPath();
                ctx.arc(e.x - 4, e.y - 5, 3, 0, Math.PI * 2);
                ctx.arc(e.x + 4, e.y - 5, 3, 0, Math.PI * 2);
                ctx.fill();
                // 眼睛高光
                ctx.fillStyle = '#ffaaaa';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(e.x - 5, e.y - 6, 1, 0, Math.PI * 2);
                ctx.arc(e.x + 3, e.y - 6, 1, 0, Math.PI * 2);
                ctx.fill();
                break;
                
            case 'ladybug':
                // 瓢虫：红色身体，黑点，黄色眼睛
                // 阴影
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius - 2, e.radius * 0.9, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                
                // 身体
                ctx.fillStyle = '#cc3333';
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 头部（深蓝黑色）
                ctx.fillStyle = '#1a2a3a';
                ctx.beginPath();
                ctx.arc(e.x, e.y - e.radius * 0.5, e.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                // 中线
                ctx.strokeStyle = '#1a2a3a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(e.x, e.y - e.radius * 0.3);
                ctx.lineTo(e.x, e.y + e.radius * 0.7);
                ctx.stroke();
                
                // 黑点
                ctx.fillStyle = '#1a2a3a';
                ctx.beginPath();
                ctx.arc(e.x - 4, e.y, 2.5, 0, Math.PI * 2);
                ctx.arc(e.x + 4, e.y, 2.5, 0, Math.PI * 2);
                ctx.arc(e.x - 3, e.y + 5, 2, 0, Math.PI * 2);
                ctx.arc(e.x + 3, e.y + 5, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 黄色眼睛
                ctx.fillStyle = '#ffff00';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#ffff00';
                ctx.beginPath();
                ctx.arc(e.x - 3, e.y - e.radius * 0.6, 2.5, 0, Math.PI * 2);
                ctx.arc(e.x + 3, e.y - e.radius * 0.6, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                break;
                
            case 'angryEgg':
                // 愤怒蛋壳（红色裂纹）
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius - 2, e.radius * 0.8, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                
                ctx.fillStyle = '#ffe8e8';
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 1.1, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 红色裂纹
                ctx.strokeStyle = '#cc0000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(e.x - 5, e.y - e.radius * 0.5);
                ctx.lineTo(e.x - 2, e.y);
                ctx.lineTo(e.x - 6, e.y + 5);
                ctx.stroke();
                
                // 锯齿嘴
                ctx.fillStyle = '#2a1a1a';
                ctx.beginPath();
                ctx.moveTo(e.x - e.radius + 3, e.y - 2);
                for (let i = 0; i < 6; i++) {
                    ctx.lineTo(e.x - e.radius + 5 + i * (e.radius * 0.35), e.y - 2 + ((i % 2) ? -6 : 3));
                }
                ctx.lineTo(e.x + e.radius - 3, e.y + 4);
                ctx.lineTo(e.x - e.radius + 3, e.y + 4);
                ctx.closePath();
                ctx.fill();
                
                // 愤怒的红眼
                ctx.fillStyle = '#ff0000';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff0000';
                ctx.beginPath();
                ctx.arc(e.x - 5, e.y - 8, 4, 0, Math.PI * 2);
                ctx.arc(e.x + 5, e.y - 8, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                break;
                
            case 'goldenBug':
                // 金甲虫
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius - 2, e.radius * 0.9, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                
                // 金色身体
                const goldGrad = ctx.createRadialGradient(e.x - 3, e.y - 3, 0, e.x, e.y, e.radius);
                goldGrad.addColorStop(0, '#ffe066');
                goldGrad.addColorStop(0.5, '#ffd700');
                goldGrad.addColorStop(1, '#cc9900');
                ctx.fillStyle = goldGrad;
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 头
                ctx.fillStyle = '#4a3a00';
                ctx.beginPath();
                ctx.arc(e.x, e.y - e.radius * 0.4, e.radius * 0.45, 0, Math.PI * 2);
                ctx.fill();
                
                // 白色眼睛
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(e.x - 3, e.y - e.radius * 0.5, 2, 0, Math.PI * 2);
                ctx.arc(e.x + 3, e.y - e.radius * 0.5, 2, 0, Math.PI * 2);
                ctx.fill();
                break;
                
            case 'ghostEgg':
                // 幽灵蛋（半透明）
                ctx.globalAlpha = 0.6 + Math.sin(frameCount * 0.1) * 0.2;
                ctx.fillStyle = '#ccccff';
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + floatY, e.radius, e.radius * 1.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 空洞眼睛
                ctx.fillStyle = 'rgba(0,0,50,0.8)';
                ctx.beginPath();
                ctx.arc(e.x - 4, e.y + floatY - 3, 4, 0, Math.PI * 2);
                ctx.arc(e.x + 4, e.y + floatY - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // 幽灵尾巴
                ctx.fillStyle = 'rgba(200,200,255,0.5)';
                ctx.beginPath();
                ctx.moveTo(e.x - 8, e.y + floatY + e.radius);
                for (let i = 0; i < 4; i++) {
                    ctx.lineTo(e.x - 8 + i * 6, e.y + floatY + e.radius + 8 + Math.sin(frameCount * 0.2 + i) * 3);
                }
                ctx.lineTo(e.x + 8, e.y + floatY + e.radius);
                ctx.closePath();
                ctx.fill();
                break;
                
            case 'spiderBug':
                // 蜘蛛虫
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 腿
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                for (let i = 0; i < 4; i++) {
                    const legAngle = (i - 1.5) * 0.4;
                    const legWave = Math.sin(frameCount * 0.2 + i) * 3;
                    // 左腿
                    ctx.beginPath();
                    ctx.moveTo(e.x - e.radius + 2, e.y + bounce);
                    ctx.quadraticCurveTo(e.x - e.radius - 8, e.y + bounce + legAngle * 10, e.x - e.radius - 12 + legWave, e.y + bounce + i * 4 - 6);
                    ctx.stroke();
                    // 右腿
                    ctx.beginPath();
                    ctx.moveTo(e.x + e.radius - 2, e.y + bounce);
                    ctx.quadraticCurveTo(e.x + e.radius + 8, e.y + bounce + legAngle * 10, e.x + e.radius + 12 - legWave, e.y + bounce + i * 4 - 6);
                    ctx.stroke();
                }
                
                // 红眼
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(e.x - 2, e.y + bounce - 2, 2, 0, Math.PI * 2);
                ctx.arc(e.x + 2, e.y + bounce - 2, 2, 0, Math.PI * 2);
                ctx.fill();
                break;
                
            case 'royalEgg':
                // 皇家蛋（紫色，戴皇冠）
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius, e.radius * 0.9, 5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                
                // 紫色蛋身
                const royalGrad = ctx.createRadialGradient(e.x, e.y - 5, 0, e.x, e.y, e.radius);
                royalGrad.addColorStop(0, '#9966cc');
                royalGrad.addColorStop(1, '#4a2a6a');
                ctx.fillStyle = royalGrad;
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 1.1, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 皇冠
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.moveTo(e.x - 8, e.y - e.radius * 0.8);
                ctx.lineTo(e.x - 10, e.y - e.radius * 0.8 - 10);
                ctx.lineTo(e.x - 4, e.y - e.radius * 0.8 - 5);
                ctx.lineTo(e.x, e.y - e.radius * 0.8 - 12);
                ctx.lineTo(e.x + 4, e.y - e.radius * 0.8 - 5);
                ctx.lineTo(e.x + 10, e.y - e.radius * 0.8 - 10);
                ctx.lineTo(e.x + 8, e.y - e.radius * 0.8);
                ctx.closePath();
                ctx.fill();
                
                // 皇冠宝石
                ctx.fillStyle = '#ff0066';
                ctx.beginPath();
                ctx.arc(e.x, e.y - e.radius * 0.8 - 8, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(e.x - 5, e.y - 3, 4, 0, Math.PI * 2);
                ctx.arc(e.x + 5, e.y - 3, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#6600aa';
                ctx.beginPath();
                ctx.arc(e.x - 5, e.y - 3, 2, 0, Math.PI * 2);
                ctx.arc(e.x + 5, e.y - 3, 2, 0, Math.PI * 2);
                ctx.fill();
                break;
                
            case 'fireBug':
                // 火焰虫
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius - 2, e.radius * 0.9, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                
                // 火焰光环
                ctx.fillStyle = 'rgba(255, 100, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius * 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // 身体
                const fireGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
                fireGrad.addColorStop(0, '#ffaa00');
                fireGrad.addColorStop(0.5, '#ff6600');
                fireGrad.addColorStop(1, '#cc3300');
                ctx.fillStyle = fireGrad;
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 头
                ctx.fillStyle = '#330000';
                ctx.beginPath();
                ctx.arc(e.x, e.y - e.radius * 0.4, e.radius * 0.45, 0, Math.PI * 2);
                ctx.fill();
                
                // 火焰眼
                ctx.fillStyle = '#ffff00';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ff6600';
                ctx.beginPath();
                ctx.arc(e.x - 3, e.y - e.radius * 0.5, 2.5, 0, Math.PI * 2);
                ctx.arc(e.x + 3, e.y - e.radius * 0.5, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                break;
                
            case 'titanEgg':
                // 泰坦蛋（巨型灰色）
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius, e.radius * 0.9, 6, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fill();
                
                // 石头质感
                const stoneGrad = ctx.createRadialGradient(e.x - 5, e.y - 5, 0, e.x, e.y, e.radius);
                stoneGrad.addColorStop(0, '#999');
                stoneGrad.addColorStop(0.5, '#777');
                stoneGrad.addColorStop(1, '#555');
                ctx.fillStyle = stoneGrad;
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce * 0.5, e.radius, e.radius * 1.1, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 裂纹
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(e.x - 8, e.y - 10);
                ctx.lineTo(e.x - 3, e.y);
                ctx.lineTo(e.x - 10, e.y + 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(e.x + 5, e.y - 8);
                ctx.lineTo(e.x + 8, e.y + 5);
                ctx.stroke();
                
                // 橙色眼睛
                ctx.fillStyle = '#ff8800';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff6600';
                ctx.beginPath();
                ctx.arc(e.x - 6, e.y - 5, 5, 0, Math.PI * 2);
                ctx.arc(e.x + 6, e.y - 5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                break;
                
            case 'queenBug':
                // 虫后
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + e.radius, e.radius * 0.9, 5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                
                // 身体
                const queenGrad = ctx.createRadialGradient(e.x, e.y - 3, 0, e.x, e.y, e.radius);
                queenGrad.addColorStop(0, '#dd4488');
                queenGrad.addColorStop(1, '#882244');
                ctx.fillStyle = queenGrad;
                ctx.beginPath();
                ctx.ellipse(e.x, e.y + bounce, e.radius, e.radius * 0.9, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 花纹
                ctx.fillStyle = '#661133';
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(e.x - 5 + i * 5, e.y + 3, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 头
                ctx.fillStyle = '#2a1a2a';
                ctx.beginPath();
                ctx.arc(e.x, e.y - e.radius * 0.5, e.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                // 触角
                ctx.strokeStyle = '#2a1a2a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(e.x - 4, e.y - e.radius * 0.8);
                ctx.quadraticCurveTo(e.x - 8, e.y - e.radius * 1.2, e.x - 6, e.y - e.radius * 1.4);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(e.x + 4, e.y - e.radius * 0.8);
                ctx.quadraticCurveTo(e.x + 8, e.y - e.radius * 1.2, e.x + 6, e.y - e.radius * 1.4);
                ctx.stroke();
                
                // 粉色眼睛
                ctx.fillStyle = '#ff66aa';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ff66aa';
                ctx.beginPath();
                ctx.arc(e.x - 3, e.y - e.radius * 0.55, 3, 0, Math.PI * 2);
                ctx.arc(e.x + 3, e.y - e.radius * 0.55, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 光环效果（Aura）
                ctx.strokeStyle = 'rgba(255, 100, 170, 0.3)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius * 2.5 + Math.sin(frameCount * 0.05) * 5, 0, Math.PI * 2);
                ctx.stroke();
                break;
                
            default:
                // 默认圆形
                ctx.beginPath();
                ctx.arc(e.x, e.y + bounce, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.arc(e.x - 3, e.y + bounce - 2, 2, 0, Math.PI * 2);
                ctx.arc(e.x + 3, e.y + bounce - 2, 2, 0, Math.PI * 2);
                ctx.fill();
        }
        ctx.restore();
    }

    // --- 敌人行为更新 ---
    function updateEnemyBehavior(e) {
        e.behaviorTimer++;
        const dist = getDistance(player.x, player.y, e.x, e.y);
        const baseAngle = Math.atan2(player.y - e.y, player.x - e.x);
        
        switch(e.behavior) {
            case 'normal': case 'tank': case 'lifesteal':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                break;
            case 'zigzag':
                const zigzag = Math.sin(e.behaviorTimer * 0.1) * 0.8;
                e.x += Math.cos(baseAngle + zigzag) * e.speed; e.y += Math.sin(baseAngle + zigzag) * e.speed;
                break;
            case 'swoop':
                if (e.phase === 0) {
                    const circleAngle = e.behaviorTimer * 0.05;
                    const tx = player.x + Math.cos(circleAngle) * 150, ty = player.y + Math.sin(circleAngle) * 150;
                    const toTarget = Math.atan2(ty - e.y, tx - e.x);
                    e.x += Math.cos(toTarget) * e.speed; e.y += Math.sin(toTarget) * e.speed;
                    if (e.behaviorTimer % 120 === 0 && Math.random() < 0.5) { e.phase = 1; e.targetX = player.x; e.targetY = player.y; }
                } else {
                    const swoopAngle = Math.atan2(e.targetY - e.y, e.targetX - e.x);
                    e.x += Math.cos(swoopAngle) * e.speed * 2; e.y += Math.sin(swoopAngle) * e.speed * 2;
                    if (getDistance(e.x, e.y, e.targetX, e.targetY) < 20) e.phase = 0;
                }
                break;
            case 'phase':
                e.alpha = 0.5 + Math.sin(e.behaviorTimer * 0.1) * 0.3;
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                if (e.behaviorTimer % 180 === 0) { e.x += (Math.random() - 0.5) * 80; e.y += (Math.random() - 0.5) * 80; }
                break;
            case 'dash':
                if (e.phase === 0) {
                    e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                    if (e.behaviorTimer % 90 === 0 && dist < 200) { e.phase = 1; e.dashAngle = baseAngle; e.dashTimer = 15; }
                } else {
                    e.x += Math.cos(e.dashAngle) * e.speed * 3; e.y += Math.sin(e.dashAngle) * e.speed * 3;
                    e.dashTimer--; if (e.dashTimer <= 0) e.phase = 0;
                }
                break;
            case 'charge':
                if (e.phase === 0) {
                    e.x += Math.cos(baseAngle) * e.speed * 0.5; e.y += Math.sin(baseAngle) * e.speed * 0.5;
                    if (e.behaviorTimer % 150 === 0 && dist < 250) { e.phase = 1; e.chargeTimer = 30; }
                } else if (e.phase === 1) {
                    e.chargeTimer--;
                    ctx.strokeStyle = 'rgba(255, 100, 0, 0.5)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(e.x, e.y, e.radius + 5 + (30 - e.chargeTimer), 0, Math.PI * 2); ctx.stroke();
                    if (e.chargeTimer <= 0) { e.phase = 2; e.chargeAngle = baseAngle; e.chargeTimer = 20; }
                } else {
                    e.x += Math.cos(e.chargeAngle) * e.speed * 4; e.y += Math.sin(e.chargeAngle) * e.speed * 4;
                    e.chargeTimer--; if (e.chargeTimer <= 0) e.phase = 0;
                }
                break;
            case 'ranged':
                if (dist > 200) { e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed; }
                else if (dist < 150) { e.x -= Math.cos(baseAngle) * e.speed * 0.5; e.y -= Math.sin(baseAngle) * e.speed * 0.5; }
                if (e.behaviorTimer % 90 === 0 && dist < 350) {
                    enemyProjectiles.push({ x: e.x, y: e.y, vx: Math.cos(baseAngle) * 4, vy: Math.sin(baseAngle) * 4, radius: 6, color: '#aa44ff', damage: 10 });
                }
                break;
            case 'scream':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                if (e.behaviorTimer % 180 === 0 && dist < 150) {
                    ctx.strokeStyle = 'rgba(170, 220, 255, 0.5)'; ctx.lineWidth = 3;
                    for (let r = 20; r < 100; r += 20) { ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI * 2); ctx.stroke(); }
                }
                break;
            case 'summon':
                if (dist > 250) { e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed; }
                if (e.behaviorTimer % 240 === 0 && enemies.length < 50) {
                    for (let i = 0; i < 2; i++) {
                        const type = enemyTypes.eggshell;
                        enemies.push({ x: e.x + randomInRange(-30, 30), y: e.y + randomInRange(-30, 30), radius: type.radius, speed: type.baseSpeed, baseSpeed: type.baseSpeed, hp: type.baseHp, maxHp: type.baseHp, color: type.color, type: 'eggshell', behavior: 'normal', shape: 'eggshell', expDrop: 1, behaviorTimer: 0, phase: 0, alpha: 1, dashAngle: 0, dashTimer: 0, chargeAngle: 0, chargeTimer: 0 });
                    }
                }
                break;
            case 'breath':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                if (e.behaviorTimer % 120 === 0 && dist < 300) {
                    for (let i = -2; i <= 2; i++) {
                        const breathAngle = baseAngle + i * 0.15;
                        enemyProjectiles.push({ x: e.x, y: e.y, vx: Math.cos(breathAngle) * 5, vy: Math.sin(breathAngle) * 5, radius: 8, color: '#ff4400', damage: 8, life: 60 });
                    }
                }
                break;
            case 'aura':
                e.x += Math.cos(baseAngle) * e.speed; e.y += Math.sin(baseAngle) * e.speed;
                enemies.forEach(other => { if (other !== e && getDistance(e.x, e.y, other.x, other.y) < 100) other.speed = other.baseSpeed * 1.3; });
                break;
        }
        e.x = Math.max(e.radius, Math.min(canvas.width - e.radius, e.x));
        e.y = Math.max(e.radius, Math.min(canvas.height - e.radius, e.y));
    }

    // --- 更新敌人投射物 ---
    function updateEnemyProjectiles() {
        for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
            const p = enemyProjectiles[i];
            p.x += p.vx; p.y += p.vy;
            if (p.life !== undefined) { p.life--; if (p.life <= 0) { enemyProjectiles.splice(i, 1); continue; } }
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color; ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fill(); ctx.shadowBlur = 0;
            if (getDistance(player.x, player.y, p.x, p.y) < player.radius + p.radius) {
                player.hp -= p.damage; hpEl.innerText = Math.max(0, Math.floor(player.hp));
                enemyProjectiles.splice(i, 1); continue;
            }
            if (p.x < -50 || p.x > canvas.width + 50 || p.y < -50 || p.y > canvas.height + 50) enemyProjectiles.splice(i, 1);
        }
    }

    // === 深度 Boss 战斗系统 ===
    function updateBoss() {
        if (!currentBoss) return;
        const b = currentBoss;
        
        b.stateTimer++;
        b.abilityCooldown--;
        
        // 检测血量阶段转换
        const hpPercent = b.hp / b.maxHp;
        if (hpPercent < 0.3 && b.phase < 3) {
            b.phase = 3;
            b.isEnraged = true;
            b.speed = b.baseSpeed * 1.5;
            showWaveNotice('💢 Boss 进入狂暴状态！');
        } else if (hpPercent < 0.6 && b.phase < 2) {
            b.phase = 2;
            b.speed = b.baseSpeed * 1.25;
            showWaveNotice('⚠️ Boss 变得更强了！');
        }
        
        // 距离计算
        const dist = getDistance(player.x, player.y, b.x, b.y);
        const angleToPlayer = Math.atan2(player.y - b.y, player.x - b.x);
        
        // 状态机更新
        switch (b.state) {
            case BOSS_STATES.CHASE:
                // 追踪玩家
                b.x += Math.cos(angleToPlayer) * b.speed;
                b.y += Math.sin(angleToPlayer) * b.speed;
                
                // 选择下一个技能
                if (b.stateTimer > 90 + Math.random() * 60) {
                    b.stateTimer = 0;
                    
                    // 根据能力列表选择技能
                    const ability = b.abilities[b.abilityIndex % b.abilities.length];
                    b.abilityIndex++;
                    
                    switch (ability) {
                        case 'aoe':
                            b.state = BOSS_STATES.WARN_AOE;
                            b.targetX = player.x;
                            b.targetY = player.y;
                            break;
                        case 'dash':
                            b.state = BOSS_STATES.WARN_DASH;
                            b.targetX = player.x;
                            b.targetY = player.y;
                            break;
                        case 'summon':
                            b.state = BOSS_STATES.SUMMON;
                            break;
                        case 'fireball':
                            shootBossFireballs(b, 5);
                            break;
                        case 'bonestorm':
                            shootBossFireballs(b, 8);
                            break;
                        case 'lightning_strike':
                            b.state = BOSS_STATES.WARN_AOE;
                            b.targetX = player.x;
                            b.targetY = player.y;
                            break;
                        case 'tentacle':
                            spawnTentacleAttack(b);
                            break;
                        case 'vortex':
                            b.state = BOSS_STATES.CASTING;
                            break;
                        case 'shockwave':
                            createBossShockwave(b);
                            break;
                        case 'teleport':
                            bossTeleport(b);
                            break;
                        case 'clone':
                            spawnBossClone(b);
                            break;
                        default:
                            // 默认冲刺
                            b.state = BOSS_STATES.WARN_DASH;
                            b.targetX = player.x;
                            b.targetY = player.y;
                    }
                }
                
                // 近身碰撞伤害
                if (dist < player.radius + b.radius) {
                    dealDamageToPlayer(0.2);
                }
                break;
                
            case BOSS_STATES.WARN_AOE:
                // AOE 预警阶段 - 绘制警告圆圈
                const warnProgress = Math.min(b.stateTimer / 90, 1);
                
                // 绘制预警圆
                ctx.beginPath();
                ctx.arc(b.targetX, b.targetY, b.aoeRadius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 50, 50, ${warnProgress * 0.45})`;
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = b.color;
                ctx.setLineDash([10, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 收缩圆（倒计时效果）
                const shrinkRadius = b.aoeRadius * (1 - warnProgress * 0.3);
                ctx.beginPath();
                ctx.arc(b.targetX, b.targetY, shrinkRadius, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 预警文字
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⚠️ 危险 ⚠️', b.targetX, b.targetY - b.aoeRadius - 10);
                
                if (b.stateTimer > 90) {
                    b.state = BOSS_STATES.AOE_EXPLODE;
                    b.stateTimer = 0;
                }
                break;
                
            case BOSS_STATES.AOE_EXPLODE:
                // AOE 爆炸
                if (b.stateTimer === 1) {
                    // 伤害判定
                    if (getDistance(player.x, player.y, b.targetX, b.targetY) < b.aoeRadius) {
                        dealDamageToPlayer(25 + b.phase * 5);
                    }
                    
                    // 创建爆炸特效
                    explosions.push({ 
                        x: b.targetX, 
                        y: b.targetY, 
                        radius: 0, 
                        maxRadius: b.aoeRadius * 1.2, 
                        damage: 0,  // 伤害已处理
                        hasDamaged: true, 
                        alpha: 1,
                        isBossAOE: true,
                        color: b.color
                    });
                    
                    // 屏幕闪白
                    b.flashTimer = 8;
                }
                
                if (b.stateTimer > 30) {
                    b.state = BOSS_STATES.CHASE;
                    b.stateTimer = 0;
                }
                break;
                
            case BOSS_STATES.WARN_DASH:
                // 冲刺预警 - 显示冲刺路径
                const dashAngle = Math.atan2(b.targetY - b.y, b.targetX - b.x);
                const dashWarnProgress = Math.min(b.stateTimer / 60, 1);
                
                // 绘制冲刺路径预警
                ctx.save();
                ctx.translate(b.x, b.y);
                ctx.rotate(dashAngle);
                
                // 危险区域
                ctx.fillStyle = `rgba(255, 50, 50, ${dashWarnProgress * 0.42})`;
                ctx.fillRect(0, -25, Math.max(canvas.width, canvas.height) + 100, 50);
                
                // 箭头指示
                for (let i = 0; i < 5; i++) {
                    const arrowX = 50 + i * 60 + (b.stateTimer * 2) % 60;
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.8 - i * 0.15})`;
                    ctx.beginPath();
                    ctx.moveTo(arrowX, 0);
                    ctx.lineTo(arrowX - 15, -12);
                    ctx.lineTo(arrowX - 15, 12);
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.restore();
                
                // Boss 蓄力动画
                b.shakeIntensity = dashWarnProgress * 3;
                
                if (b.stateTimer > 60) {
                    b.state = BOSS_STATES.DASHING;
                    b.stateTimer = 0;
                    b.vx = Math.cos(dashAngle) * b.dashSpeed;
                    b.vy = Math.sin(dashAngle) * b.dashSpeed;
                    b.shakeIntensity = 0;
                }
                break;
                
            case BOSS_STATES.DASHING:
                // 高速冲刺
                b.x += b.vx;
                b.y += b.vy;
                
                // 冲刺拖尾效果
                if (b.stateTimer % 2 === 0) {
                    createBossTrail(b);
                }
                
                // 碰撞玩家
                if (dist < player.radius + b.radius + 10) {
                    dealDamageToPlayer(20 + b.phase * 5);
                    b.state = BOSS_STATES.STUNNED;
                    b.stateTimer = 0;
                }
                
                // 冲刺结束条件
                if (b.stateTimer > 25 || b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) {
                    b.state = BOSS_STATES.CHASE;
                    b.stateTimer = 0;
                }
                break;
                
            case BOSS_STATES.STUNNED:
                // 短暂眩晕（撞墙或撞到玩家后）
                if (b.stateTimer > 45) {
                    b.state = BOSS_STATES.CHASE;
                    b.stateTimer = 0;
                }
                break;
                
            case BOSS_STATES.SUMMON:
                // 召唤小怪
                if (b.stateTimer === 1) {
                    const summonCount = 2 + b.phase;
                    for (let i = 0; i < summonCount; i++) {
                        setTimeout(() => {
                            if (!currentBoss) return;
                            const angle = (i / summonCount) * Math.PI * 2;
                            const sx = b.x + Math.cos(angle) * 50;
                            const sy = b.y + Math.sin(angle) * 50;
                            
                            // 召唤特效
                            explosions.push({ x: sx, y: sy, radius: 0, maxRadius: 30, damage: 0, hasDamaged: true, alpha: 0.8 });
                            
                            const type = enemyTypes.eggshell;
                            enemies.push({
                                x: sx, y: sy,
                                radius: type.radius,
                                speed: type.baseSpeed * 1.3,
                                baseSpeed: type.baseSpeed * 1.3,
                                hp: type.baseHp * 2,
                                maxHp: type.baseHp * 2,
                                color: b.secondaryColor,
                                type: 'eggshell',
                                behavior: 'normal',
                                shape: 'eggshell',
                                expDrop: 2,
                                behaviorTimer: 0, phase: 0, alpha: 1,
                                dashAngle: 0, dashTimer: 0, chargeAngle: 0, chargeTimer: 0
                            });
                        }, i * 150);
                    }
                }
                
                if (b.stateTimer > 60 + b.phase * 20) {
                    b.state = BOSS_STATES.CHASE;
                    b.stateTimer = 0;
                }
                break;
                
            case BOSS_STATES.CASTING:
                // 施法（漩涡吸引）
                if (b.stateTimer < 120) {
                    // 吸引玩家
                    const pullStrength = 1.5 + b.phase * 0.5;
                    const pullAngle = Math.atan2(b.y - player.y, b.x - player.x);
                    player.x += Math.cos(pullAngle) * pullStrength;
                    player.y += Math.sin(pullAngle) * pullStrength;
                    
                    // 漩涡特效
                    ctx.strokeStyle = `rgba(${b.color === '#6600aa' ? '102, 0, 170' : '255, 100, 0'}, ${0.5 + Math.sin(b.stateTimer * 0.2) * 0.3})`;
                    ctx.lineWidth = 3;
                    for (let r = 30; r < 200; r += 30) {
                        ctx.beginPath();
                        ctx.arc(b.x, b.y, r, b.stateTimer * 0.1, b.stateTimer * 0.1 + Math.PI);
                        ctx.stroke();
                    }
                }
                
                if (b.stateTimer > 120) {
                    b.state = BOSS_STATES.CHASE;
                    b.stateTimer = 0;
                }
                break;
        }
        
        // 边界限制
        b.x = Math.max(b.radius, Math.min(canvas.width - b.radius, b.x));
        b.y = Math.max(b.radius, Math.min(canvas.height - b.radius, b.y));
        
        // 绘制 Boss
        drawBoss(b);
        
        // 更新分身
        updateBossClones(b);
        
        // 更新血条
        bossBar.style.width = (b.hp / b.maxHp) * 100 + '%';
        
        // 阶段指示器
        bossNameEl.innerHTML = `${b.name} ${b.isEnraged ? '💢' : ''} <span style="font-size:10px">(阶段 ${b.phase})</span>`;
        
        // 闪白效果
        if (b.flashTimer > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${b.flashTimer / 10})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            b.flashTimer--;
        }
        
        // Boss 死亡
        if (b.hp <= 0) {
            // 死亡动画
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    explosions.push({
                        x: b.x + randomInRange(-40, 40),
                        y: b.y + randomInRange(-40, 40),
                        radius: 0,
                        maxRadius: 50 + Math.random() * 30,
                        damage: 0,
                        hasDamaged: true,
                        alpha: 1
                    });
                }, i * 100);
            }
            
            // 掉落大量经验
            for (let i = 0; i < 15; i++) {
                gems.push({ 
                    x: b.x + randomInRange(-50, 50), 
                    y: b.y + randomInRange(-50, 50), 
                    val: b.expDrop / 15 
                });
            }
            
            bossDefeated++;
            score += 50 + bossDefeated * 20;
            scoreEl.innerText = score;
            currentBoss = null;
            bossBarContainer.style.display = 'none';
            showWaveNotice(`🎉 ${b.name} 被击败！`);
        }
    }
    
    // 绘制 Boss
    function drawBoss(b) {
        ctx.save();
        
        // 蓄力震动
        const shakeX = b.shakeIntensity ? (Math.random() - 0.5) * b.shakeIntensity * 2 : 0;
        const shakeY = b.shakeIntensity ? (Math.random() - 0.5) * b.shakeIntensity * 2 : 0;
        
        // 狂暴光环
        if (b.isEnraged) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius + 15 + Math.sin(frameCount * 0.1) * 5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        // Boss 主体
        const grad = ctx.createRadialGradient(
            b.x + shakeX - 10, b.y + shakeY - 10, 0,
            b.x + shakeX, b.y + shakeY, b.radius
        );
        grad.addColorStop(0, b.secondaryColor);
        grad.addColorStop(0.7, b.color);
        grad.addColorStop(1, '#000');
        
        ctx.beginPath();
        ctx.arc(b.x + shakeX, b.y + shakeY, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.shadowBlur = 30;
        ctx.shadowColor = b.color;
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // 外圈
        ctx.strokeStyle = b.secondaryColor;
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // Boss 眼睛
        const eyeOffsetX = (player.x - b.x) * 0.02;
        const eyeOffsetY = (player.y - b.y) * 0.02;
        
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(b.x + shakeX - 12 + eyeOffsetX, b.y + shakeY - 5, 8, 0, Math.PI * 2);
        ctx.arc(b.x + shakeX + 12 + eyeOffsetX, b.y + shakeY - 5, 8, 0, Math.PI * 2);
        ctx.fill();
        
        // 瞳孔（跟踪玩家）
        ctx.fillStyle = b.state === BOSS_STATES.DASHING ? '#ff0000' : '#000';
        ctx.beginPath();
        ctx.arc(b.x + shakeX - 12 + eyeOffsetX * 2, b.y + shakeY - 5 + eyeOffsetY, 4, 0, Math.PI * 2);
        ctx.arc(b.x + shakeX + 12 + eyeOffsetX * 2, b.y + shakeY - 5 + eyeOffsetY, 4, 0, Math.PI * 2);
        ctx.fill();
        
        // 狂暴状态眼睛发光
        if (b.isEnraged) {
            ctx.fillStyle = '#ff0000';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0000';
            ctx.beginPath();
            ctx.arc(b.x + shakeX - 12, b.y + shakeY - 5, 3, 0, Math.PI * 2);
            ctx.arc(b.x + shakeX + 12, b.y + shakeY - 5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 状态指示
        if (b.state === BOSS_STATES.STUNNED) {
            ctx.fillStyle = '#ffff00';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('💫', b.x, b.y - b.radius - 10);
        }
        
        ctx.restore();
    }
    
    // Boss 辅助函数
    function shootBossFireballs(b, count) {
        const baseAngle = Math.atan2(player.y - b.y, player.x - b.x);
        for (let i = 0; i < count; i++) {
            const angle = baseAngle + (i - (count - 1) / 2) * 0.25;
            enemyProjectiles.push({
                x: b.x,
                y: b.y,
                vx: Math.cos(angle) * (4 + b.phase),
                vy: Math.sin(angle) * (4 + b.phase),
                radius: 10,
                color: b.color,
                damage: 12 + b.phase * 3,
                life: 120
            });
        }
    }
    
    function spawnTentacleAttack(b) {
        for (let i = 0; i < 4 + b.phase; i++) {
            setTimeout(() => {
                if (!currentBoss) return;
                const tx = player.x + randomInRange(-80, 80);
                const ty = player.y + randomInRange(-80, 80);
                
                // 触手预警
                setTimeout(() => {
                    // 伤害
                    if (getDistance(player.x, player.y, tx, ty) < 40) {
                        dealDamageToPlayer(15);
                    }
                    explosions.push({ x: tx, y: ty, radius: 0, maxRadius: 50, damage: 0, hasDamaged: true, alpha: 1 });
                }, 500);
                
                // 警告圈
                const warnDuration = 30;
                let warnFrame = 0;
                const warnInterval = setInterval(() => {
                    warnFrame++;
                    if (warnFrame >= warnDuration || !currentBoss) {
                        clearInterval(warnInterval);
                        return;
                    }
                }, 16);
            }, i * 200);
        }
    }
    
    function createBossShockwave(b) {
        // 创建扩散冲击波
        for (let r = 0; r < 3; r++) {
            setTimeout(() => {
                if (!currentBoss) return;
                explosions.push({
                    x: b.x,
                    y: b.y,
                    radius: 0,
                    maxRadius: 150 + r * 30,
                    damage: 0,
                    hasDamaged: true,
                    alpha: 0.8,
                    isShockwave: true
                });
                
                // 环形伤害判定
                if (getDistance(player.x, player.y, b.x, b.y) < 150 + r * 30 + 30) {
                    dealDamageToPlayer(10);
                }
            }, r * 300);
        }
    }
    
    function bossTeleport(b) {
        // 瞬移到玩家附近
        const angle = Math.random() * Math.PI * 2;
        const dist = 80 + Math.random() * 60;
        b.x = player.x + Math.cos(angle) * dist;
        b.y = player.y + Math.sin(angle) * dist;
        b.x = Math.max(b.radius, Math.min(canvas.width - b.radius, b.x));
        b.y = Math.max(b.radius, Math.min(canvas.height - b.radius, b.y));
        
        // 瞬移特效
        explosions.push({ x: b.x, y: b.y, radius: 0, maxRadius: 60, damage: 0, hasDamaged: true, alpha: 0.7 });
    }
    
    function spawnBossClone(b) {
        if (b.clones.length >= 2) return;
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 80;
        b.clones.push({
            x: b.x + Math.cos(angle) * dist,
            y: b.y + Math.sin(angle) * dist,
            hp: 3,
            angle: 0
        });
    }
    
    function updateBossClones(b) {
        for (let i = b.clones.length - 1; i >= 0; i--) {
            const c = b.clones[i];
            
            // 分身绕主体旋转
            c.angle += 0.03;
            c.x = b.x + Math.cos(c.angle) * 80;
            c.y = b.y + Math.sin(c.angle) * 80;
            
            // 绘制分身（半透明）
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.arc(c.x, c.y, b.radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.globalAlpha = 1;
            
            // 分身被子弹击中
            for (let j = bullets.length - 1; j >= 0; j--) {
                const bullet = bullets[j];
                if (getDistance(c.x, c.y, bullet.x, bullet.y) < b.radius * 0.6 + bullet.radius) {
                    c.hp--;
                    bullets.splice(j, 1);
                    if (c.hp <= 0) {
                        b.clones.splice(i, 1);
                        explosions.push({ x: c.x, y: c.y, radius: 0, maxRadius: 40, damage: 0, hasDamaged: true, alpha: 1 });
                    }
                    break;
                }
            }
        }
    }
    
    function createBossTrail(b) {
        // 冲刺拖尾
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(b.x - b.vx * 0.5, b.y - b.vy * 0.5, b.radius * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    
    function dealDamageToPlayer(damage) {
        // 闪避检测
        if (player.dodgeChance > 0 && Math.random() < player.dodgeChance) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('闪避!', player.x, player.y - 30);
            return;
        }
        
        player.hp -= damage;
        hpEl.innerText = Math.max(0, Math.floor(player.hp));
        
        // 受伤屏幕闪红
        ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (player.hp <= 0) {
            if (player.revive && !player.reviveUsed) {
                player.reviveUsed = true;
                player.hp = player.maxHp * 0.5;
                hpEl.innerText = Math.floor(player.hp);
                showWaveNotice('🔥 凤凰涅槃！');
            } else {
                isGameOver = true;
                const talentNames = activeTalents.map(t => t.name).join(', ') || '无';
                alert(`💀 被击溃！\n存活时间: ${formatTime(gameTime)}\n等级: Lv.${player.level}\n击杀: ${score}\nBoss击败: ${bossDefeated}\n天赋: ${talentNames}`);
                location.reload();
            }
        }
    }

    function gainExp(amount) {
        player.exp += amount * player.expBonus;
        if (player.exp >= player.maxExp) {
            player.level++;
            player.exp -= player.maxExp;
            player.maxExp = Math.floor(player.maxExp * 1.35);
            levelEl.innerText = player.level;
            triggerLevelUp();
        }
        expBar.style.width = (player.exp / player.maxExp) * 100 + '%';
    }

    function triggerLevelUp() {
        isPaused = true;
        levelUpMenu.style.display = 'block';
        cardsContainer.innerHTML = '';
        
        const pool = getUpgradePool();
        let shuffled = pool.sort(() => 0.5 - Math.random());
        shuffled.sort((a, b) => {
            if (a.isSpecial && !b.isSpecial) return -1;
            if (!a.isSpecial && b.isSpecial) return 1;
            if (a.isNew && !b.isNew) return -1;
            if (!a.isNew && b.isNew) return 1;
            return 0;
        });
        let choices = shuffled.slice(0, player.upgradeChoices);

        choices.forEach(choice => {
            const card = document.createElement('div');
            card.className = 'card' + (choice.isNew ? ' card-new' : '') + (choice.isSpecial ? ' card-special' : '');
            card.innerHTML = `<div class="type">${choice.type || ''}</div><h3>${choice.name}</h3><p>${choice.desc}</p>`;
            card.onclick = () => {
                choice.apply();
                levelUpMenu.style.display = 'none';
                isPaused = false;
                gameLoop();
            };
            cardsContainer.appendChild(card);
        });
    }

    function updateWeaponDisplay() {
        let display = '';
        Object.entries(weapons).forEach(([key, w]) => {
            if (w.owned) display += `${w.icon}${w.name[0]}${w.level} `;
        });
        weaponListEl.innerHTML = display || '无';
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // --- 主循环 ---
    function gameLoop() {
        if (isGameOver || isPaused) return;
        
        // 绘制背景场景
        drawBackground();
        
        frameCount++;
        
        // 更新游戏时间
        if (frameCount % 60 === 0) {
            gameTime++;
            timerEl.innerText = formatTime(gameTime);
            
            // HP回复天赋
            if (player.hpRegen > 0) {
                player.hp = Math.min(player.maxHp, player.hp + player.hpRegen);
                hpEl.innerText = Math.floor(player.hp);
            }
            
            // 新敌人类型解锁通知
            Object.entries(enemyTypes).forEach(([key, type]) => {
                if (gameTime === type.unlock && type.unlock > 0) {
                    showWaveNotice(`⚠️ 新敌人出现: ${type.name}!`);
                }
            });
            
            // Boss 生成（每60秒）
            if (gameTime > 0 && gameTime % 60 === 0 && !currentBoss) {
                spawnBoss();
            }
        }

        // 玩家移动（键盘 + 虚拟摇杆）
        let moveX = 0, moveY = 0;
        
        // 键盘输入
        if (keys.w) moveY -= 1;
        if (keys.s) moveY += 1;
        if (keys.a) moveX -= 1;
        if (keys.d) moveX += 1;
        
        // 虚拟摇杆输入（优先级更高）
        if (joystickActive && (Math.abs(joystickInput.x) > 0.1 || Math.abs(joystickInput.y) > 0.1)) {
            moveX = joystickInput.x;
            moveY = joystickInput.y;
        }
        
        // 标准化对角移动
        const moveLength = Math.hypot(moveX, moveY);
        if (moveLength > 0) {
            moveX = moveX / moveLength;
            moveY = moveY / moveLength;
        }
        
        // 应用移动
        const newX = player.x + moveX * player.speed;
        const newY = player.y + moveY * player.speed;
        if (newX > player.radius && newX < canvas.width - player.radius) player.x = newX;
        if (newY > player.radius && newY < canvas.height - player.radius) player.y = newY;

        // 更新角色动画（包括朝向敌人方向）
        updatePlayerAnimation(moveX, moveY, player.targetAngle);

        // 所有武器
        fireBullets();
        fireExplosion();
        fireLightning();
        fireLaser();
        fireBlackhole();
        fireMeteor();
        updateOrbitals();
        updateSummons();
        updateExplosions();
        updateLightnings();
        updateBlackholes();
        updateMeteors();
        updateEnemyProjectiles();

        // 刷怪
        const spawnRate = Math.max(10, 45 - Math.floor(gameTime / 10));
        if (frameCount % spawnRate === 0) spawnEnemy();

        // 绘制拾取范围
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.pickupRange, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 229, 255, 0.05)';
        ctx.fill();

        // 绘制武士角色
        drawPlayer();

        // 经验宝石
        for (let i = gems.length - 1; i >= 0; i--) {
            let g = gems[i];
            const dist = getDistance(player.x, player.y, g.x, g.y);
            if (dist < player.pickupRange) {
                const angle = Math.atan2(player.y - g.y, player.x - g.x);
                g.x += Math.cos(angle) * 8;
                g.y += Math.sin(angle) * 8;
            }
            if (dist < player.radius + 5) { gainExp(g.val); gems.splice(i, 1); continue; }
            ctx.beginPath();
            ctx.arc(g.x, g.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffaa';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00ffaa';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 子弹
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.x += b.vx;
            b.y += b.vy;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffff00';
            ctx.fill();
            if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) bullets.splice(i, 1);
        }

        // 敌人
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            
            // 使用行为系统更新敌人移动
            updateEnemyBehavior(e);
            
            // 使用外观系统绘制敌人
            drawEnemy(e);
            
            // 血条
            if (e.hp < e.maxHp) {
                ctx.fillStyle = '#333';
                ctx.fillRect(e.x - 15, e.y - 20, 30, 4);
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x - 15, e.y - 20, 30 * (e.hp / e.maxHp), 4);
            }
            
            // 死亡处理
            if (e.hp <= 0) {
                gems.push({ x: e.x, y: e.y, val: e.expDrop || 2 });
                enemies.splice(i, 1);
                score++;
                scoreEl.innerText = score;
                // 击杀回血天赋
                if (player.lifestealOnKill > 0) {
                    player.hp = Math.min(player.maxHp, player.hp + player.lifestealOnKill);
                    hpEl.innerText = Math.floor(player.hp);
                }
                continue;
            }
            
            // 碰撞玩家
            // 碰撞玩家
            if (getDistance(player.x, player.y, e.x, e.y) < player.radius + e.radius) {
                // 闪避检测
                if (player.dodgeChance > 0 && Math.random() < player.dodgeChance) {
                    // 闪避成功，显示效果
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.fillText('闪避!', player.x, player.y - 30);
                } else {
                    player.hp -= 0.5;
                    // 吸血鬼吸血
                    if (e.behavior === 'lifesteal') {
                        e.hp = Math.min(e.maxHp, e.hp + 0.3);
                    }
                    hpEl.innerText = Math.max(0, Math.floor(player.hp));
                }
                if (player.hp <= 0) {
                    // 复活天赋
                    if (player.revive && !player.reviveUsed) {
                        player.reviveUsed = true;
                        player.hp = player.maxHp * 0.5;
                        hpEl.innerText = Math.floor(player.hp);
                        showWaveNotice('🔥 凤凰涅槃！');
                    } else {
                        isGameOver = true;
                        const talentNames = activeTalents.map(t => t.name).join(', ') || '无';
                        alert(`💀 被击溃！\n存活时间: ${formatTime(gameTime)}\n等级: Lv.${player.level}\n击杀: ${score}\nBoss击败: ${bossDefeated}\n天赋: ${talentNames}`);
                        location.reload();
                    }
                }
            }
            
            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (!b.hitEnemies.has(e) && getDistance(e.x, e.y, b.x, b.y) < e.radius + b.radius) {
                    // 秒杀天赋（只对非Boss生效）
                    if (player.instakillChance > 0 && Math.random() < player.instakillChance) {
                        e.hp = 0;
                    } else {
                        const dmg = calcDamage(b.damage);
                        e.hp -= dmg.damage;
                    }
                    b.hitEnemies.add(e);
                    b.pierceLeft--;
                    if (b.pierceLeft <= 0) bullets.splice(j, 1);
                }
            }
        }

        // Boss
        updateBoss();
        
        // Boss 受弹判定
        if (currentBoss) {
            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (!b.hitEnemies.has(currentBoss) && getDistance(currentBoss.x, currentBoss.y, b.x, b.y) < currentBoss.radius + b.radius) {
                    const dmg = calcDamage(b.damage, true); // Boss伤害加成
                    currentBoss.hp -= dmg.damage;
                    b.hitEnemies.add(currentBoss);
                    b.pierceLeft--;
                    if (b.pierceLeft <= 0) bullets.splice(j, 1);
                }
            }
        }

        // 敌人统计
        if (frameCount % 30 === 0) {
            const types = {};
            enemies.forEach(e => { types[e.type] = (types[e.type] || 0) + 1; });
            let stats = '敌人: ';
            Object.entries(types).slice(0, 5).forEach(([type, count]) => {
                const t = enemyTypes[type];
                if (t) stats += `${t.name}×${count} `;
            });
            if (Object.keys(types).length > 5) stats += '...';
            enemyStatsEl.innerText = stats;
        }

        requestAnimationFrame(gameLoop);
    }

    updateWeaponDisplay();
    // 游戏在选择天赋后启动
</script>
</body>
</html>
