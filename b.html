<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>割草 x 破壞小隊 Lite</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #080b12; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif; color: #eef3ff; }
    #app { position: fixed; inset: 0; }
    canvas { width: 100%; height: 100%; display: block; background: radial-gradient(120% 90% at 50% 0%, #15233b 0%, #0b1220 45%, #080b12 100%); touch-action: none; }

    .hud {
      position: fixed;
      left: 10px;
      right: 10px;
      top: max(10px, env(safe-area-inset-top));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      pointer-events: none;
    }
    .panel {
      background: rgba(7, 10, 18, 0.62);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 12px;
      padding: 8px 10px;
      backdrop-filter: blur(4px);
    }
    .row { display: flex; flex-wrap: wrap; gap: 8px 10px; font-size: 12px; }
    .title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
    .chip { border-radius: 999px; padding: 2px 8px; font-weight: 700; font-size: 12px; }
    .chip.good { background: rgba(73, 225, 151, 0.2); color: #8ef2c3; }
    .chip.warn { background: rgba(255, 194, 87, 0.2); color: #ffd58a; }
    .chip.bad { background: rgba(255, 111, 111, 0.2); color: #ffb0b0; }

    #hint {
      position: fixed;
      left: 50%;
      bottom: calc(12px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      background: rgba(7, 10, 18, 0.68);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    #pick {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      padding: 16px;
      z-index: 5;
    }
    .pickCard {
      width: min(640px, 100%);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(8, 12, 22, 0.95);
      padding: 14px;
    }
    .pickTitle { font-size: 16px; font-weight: 800; margin-bottom: 10px; }
    .pickGrid { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .optBtn {
      width: 100%;
      text-align: left;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      color: #eef3ff;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
    }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      z-index: 6;
      padding: 16px;
    }
    .goCard {
      width: min(420px, 100%);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(8, 12, 22, 0.95);
      padding: 16px;
    }
    .goTitle { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .goBtn {
      margin-top: 12px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 11px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>
  </div>

  <div class="hud">
    <div class="panel">
      <div class="title">割草 x 破壞小隊 Lite</div>
      <div class="row">
        <span id="hp" class="chip good">HP 100</span>
        <span id="squad" class="chip">隊伍 1</span>
        <span id="shard" class="chip warn">碎片 0/3</span>
        <span id="kills" class="chip">擊殺 0</span>
        <span id="timer" class="chip">00:00</span>
      </div>
    </div>
    <div class="panel" style="min-width:98px;text-align:right;">
      <div style="font-size:11px;opacity:.8;">下一升級</div>
      <div id="nextLv" style="font-size:18px;font-weight:800;">20</div>
    </div>
  </div>

  <div id="hint">主角開箱｜隊員清怪｜碎片需求隨等級提高｜血量歸零先掉隊員</div>

  <div id="pick">
    <div class="pickCard">
      <div class="pickTitle">選 1 個強化</div>
      <div id="pickGrid" class="pickGrid"></div>
    </div>
  </div>

  <div id="gameOver">
    <div class="goCard">
      <div class="goTitle">你倒下了</div>
      <div id="goStats" style="opacity:.9;line-height:1.6"></div>
      <button id="restart" class="goBtn">再來一局</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hpEl = document.getElementById('hp');
  const squadEl = document.getElementById('squad');
  const shardEl = document.getElementById('shard');
  const killsEl = document.getElementById('kills');
  const timerEl = document.getElementById('timer');
  const nextLvEl = document.getElementById('nextLv');
  const hintEl = document.getElementById('hint');
  const pickEl = document.getElementById('pick');
  const pickGridEl = document.getElementById('pickGrid');
  const gameOverEl = document.getElementById('gameOver');
  const goStatsEl = document.getElementById('goStats');
  const restartBtn = document.getElementById('restart');

  const world = { w: 2200, h: 2200 };
  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const JOY = { maxR: 56, dead: 0.14 };
  const input = {
    joy: {
      active: false,
      id: null,
      cx: 0,
      cy: 0,
      dx: 0,
      dy: 0,
      nx: 0,
      ny: 0,
      mag: 0
    },
    keys: new Set()
  };

  function resetJoy() {
    input.joy.active = false;
    input.joy.id = null;
    input.joy.dx = 0;
    input.joy.dy = 0;
    input.joy.nx = 0;
    input.joy.ny = 0;
    input.joy.mag = 0;
  }

  function updateJoyFromPoint(clientX, clientY) {
    const j = input.joy;
    let dx = clientX - j.cx;
    let dy = clientY - j.cy;
    const len = Math.hypot(dx, dy) || 1;
    const clamped = Math.min(JOY.maxR, len);
    dx = dx / len * clamped;
    dy = dy / len * clamped;
    j.dx = dx;
    j.dy = dy;
    j.nx = dx / JOY.maxR;
    j.ny = dy / JOY.maxR;
    j.mag = clamped / JOY.maxR;
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (state.pausePick || state.gameOver) return;
    const inControlArea = e.clientX <= W * 0.78 && e.clientY >= H * 0.22;
    if (!inControlArea) return;
    const j = input.joy;
    j.active = true;
    j.id = e.pointerId;
    j.cx = clamp(e.clientX, 62, W * 0.72);
    j.cy = clamp(e.clientY, H * 0.38, H - 62);
    updateJoyFromPoint(e.clientX, e.clientY);
  });

  canvas.addEventListener('pointermove', (e) => {
    const j = input.joy;
    if (!j.active) return;
    if (j.id !== null && j.id !== e.pointerId) return;
    updateJoyFromPoint(e.clientX, e.clientY);
  });

  function stopPointer(e) {
    const j = input.joy;
    if (!j.active) return;
    if (j.id !== null && j.id !== e.pointerId) return;
    resetJoy();
  }
  canvas.addEventListener('pointerup', stopPointer);
  canvas.addEventListener('pointercancel', stopPointer);


  window.addEventListener('keydown', (e) => input.keys.add(e.key.toLowerCase()));
  window.addEventListener('keyup', (e) => input.keys.delete(e.key.toLowerCase()));

  const ROLE_CFG = {
    blade: {
      name: '斬擊手', icon: '⚔', color: '#8ef2c3',
      range: 104, fireGap: 0.96, dmg: 16,
      bulletR: 0, pierce: 0, speedMul: 1,
      melee: true, cleaveR: 62
    },
    gunner: {
      name: '射手', icon: '✦', color: '#9bceff',
      range: 290, fireGap: 0.44, dmg: 7,
      bulletR: 3, pierce: 1, speedMul: 1.22,
      melee: false, cleaveR: 0
    },
    bomber: {
      name: '爆破手', icon: '✹', color: '#ffc680',
      range: 255, fireGap: 1.18, dmg: 24,
      bulletR: 7, pierce: 1, speedMul: 0.78,
      melee: false, cleaveR: 0,
      aoe: 56
    }
  };
  const ROLE_KEYS = ['blade', 'gunner', 'bomber'];
  const MAX_UNIT_LEVEL = 9;

  function getRoleUnit(role) {
    return state.squad.find((u) => u.role === role) || null;
  }

  function needFragmentsFor(role) {
    const u = getRoleUnit(role);
    if (!u) return 3;
    return Math.min(8, 3 + Math.floor(u.level / 2));
  }


  function makeState() {
    return {
      time: 0,
      pausePick: false,
      gameOver: false,
      player: { x: world.w / 2, y: world.h / 2, r: 14, hp: 100, maxHp: 100, speed: 210, hurtCD: 0, openRange: 74, openPower: 20 },
      squad: [{ role: 'gunner', level: 1, angleBase: 0, fireCD: 0 }],
      enemies: [],
      bullets: [],
      crates: [],
      drops: [],
      fx: [],
      spawnEnemyCD: 0,
      spawnCrateCD: 0,
      kills: 0,
      fragments: { blade: 0, gunner: 0, bomber: 0 },
      score: 0,
      level: 1,
      nextLevelKills: 20,
      buffs: { dmg: 1, rate: 0.78, speed: 1, pierce: 0, magnet: 1, move: 1, open: 1 },
      logCD: 0,
      logText: '碎片需求會隨等級提高；血量歸零先失去1名隊員'
    };
  }

  let state = makeState();

  function addFx(x, y, text, c = '#ffffff') {
    state.fx.push({ x, y, text, c, life: 0.8 });
  }

  function shardLabel(role) {
    return ROLE_CFG[role].name + '碎片';
  }

  function grantRoleUpgrade(role) {
    const cfg = ROLE_CFG[role];
    let unit = getRoleUnit(role);
    if (!unit) {
      if (state.squad.length >= 5) {
        state.score += 22;
        addFx(state.player.x, state.player.y - 30, '+22', '#ffd27b');
        return;
      }
      unit = { role, level: 1, angleBase: Math.random() * Math.PI * 2, fireCD: 0 };
      state.squad.push(unit);
      addFx(state.player.x, state.player.y - 28, cfg.icon + ' ' + cfg.name + '入隊', cfg.color);
      return;
    }

    if (unit.level >= MAX_UNIT_LEVEL) {
      state.buffs.dmg *= 1.03;
      addFx(state.player.x, state.player.y - 28, cfg.icon + ' 滿級轉火力+', cfg.color);
      return;
    }

    unit.level += 1;
    addFx(state.player.x, state.player.y - 28, cfg.icon + ' ' + cfg.name + ' Lv' + unit.level, cfg.color);
  }



  function spawnEnemy(elite = false) {
    const side = Math.floor(Math.random() * 4);
    const pad = 80;
    const cam = state.player;
    let x = cam.x, y = cam.y;
    if (side === 0) { x = cam.x - W / 2 - pad; y = cam.y + rand(-H / 2, H / 2); }
    if (side === 1) { x = cam.x + W / 2 + pad; y = cam.y + rand(-H / 2, H / 2); }
    if (side === 2) { y = cam.y - H / 2 - pad; x = cam.x + rand(-W / 2, W / 2); }
    if (side === 3) { y = cam.y + H / 2 + pad; x = cam.x + rand(-W / 2, W / 2); }

    const t = elite ? 1 : Math.random();
    let hp = 16 + state.time * 0.22;
    let spd = 55 + Math.min(85, state.time * 0.14);
    let r = 10;
    let color = '#ff6f7f';
    let kind = 'grunt';
    let icon = '●';

    if (t > 0.86) {
      hp *= 2.8;
      spd *= 0.78;
      r = 15;
      color = '#ffad5e';
      kind = 'tank';
      icon = '🛡';
    } else if (t < 0.26) {
      hp *= 0.75;
      spd *= 1.28;
      r = 8;
      color = '#ff7be1';
      kind = 'runner';
      icon = '⚡';
    }

    if (elite) {
      hp *= 3.2;
      r += 4;
      color = '#c88dff';
      kind = 'elite';
      icon = '☠';
    }

    state.enemies.push({ x, y, r, hp, maxHp: hp, spd, color, kind, icon, hitCD: 0 });
  }


  function spawnCrate() {
    if (state.crates.length >= 8) return;
    const d = rand(240, 520);
    const a = rand(0, Math.PI * 2);
    const x = clamp(state.player.x + Math.cos(a) * d, 80, world.w - 80);
    const y = clamp(state.player.y + Math.sin(a) * d, 80, world.h - 80);
    const hp = 36 + state.time * 0.25;
    state.crates.push({ x, y, r: 17, hp, maxHp: hp });
  }


  function nearestEnemy(x, y, range) {
    let best = null;
    let bestD2 = range * range;
    for (const e of state.enemies) {
      const dx = e.x - x;
      const dy = e.y - y;
      const d2 = dx * dx + dy * dy;
      if (d2 < bestD2) {
        best = e;
        bestD2 = d2;
      }
    }
    return best;
  }

  function nearestCrate(x, y, range) {
    let best = null;
    let bestD2 = range * range;
    for (const c of state.crates) {
      const dx = c.x - x;
      const dy = c.y - y;
      const d2 = dx * dx + dy * dy;
      if (d2 < bestD2) {
        best = c;
        bestD2 = d2;
      }
    }
    return best;
  }


  function shoot(fromX, fromY, tx, ty, spec) {
    const dx = tx - fromX;
    const dy = ty - fromY;
    const len = Math.hypot(dx, dy) || 1;
    const speed = 470 * (spec.speedMul || 1);
    state.bullets.push({
      x: fromX,
      y: fromY,
      vx: dx / len * speed,
      vy: dy / len * speed,
      r: spec.r,
      color: spec.color,
      icon: spec.icon,
      role: spec.role,
      dmg: spec.dmg,
      pierce: spec.pierce,
      aoe: spec.aoe || 0,
      life: 1.1
    });
  }

  function killEnemyAt(index, e) {
    state.kills++;
    state.score += 1;
    if (Math.random() < 0.45) {
      state.drops.push({ x: e.x + rand(-8, 8), y: e.y + rand(-8, 8), t: 'score', v: 1, r: 6, color: '#ffe078', icon: '✶' });
    }
    addFx(e.x, e.y - 16, '+1', '#ffd27b');
    state.enemies.splice(index, 1);
  }

  function splashDamage(x, y, radius, dmg) {
    const r2 = radius * radius;
    for (let j = state.enemies.length - 1; j >= 0; j--) {
      const e = state.enemies[j];
      const dx = e.x - x;
      const dy = e.y - y;
      const d2 = dx * dx + dy * dy;
      if (d2 > r2) continue;
      const ratio = 1 - Math.sqrt(d2) / radius;
      const dealt = dmg * (0.42 + ratio * 0.58);
      e.hp -= dealt;
      if (e.hp <= 0) killEnemyAt(j, e);
    }
    addFx(x, y - 10, '爆', '#ffc680');
  }



  function updatePlayer(dt) {
    const p = state.player;
    let vx = 0, vy = 0;

    if (input.joy.active && input.joy.mag > JOY.dead) {
      const power = (input.joy.mag - JOY.dead) / (1 - JOY.dead);
      vx += input.joy.nx * power;
      vy += input.joy.ny * power;
    }

    if (input.keys.has('w') || input.keys.has('arrowup')) vy -= 1;
    if (input.keys.has('s') || input.keys.has('arrowdown')) vy += 1;
    if (input.keys.has('a') || input.keys.has('arrowleft')) vx -= 1;
    if (input.keys.has('d') || input.keys.has('arrowright')) vx += 1;

    const len = Math.hypot(vx, vy) || 1;
    const spd = p.speed * state.buffs.move;
    if (Math.hypot(vx, vy) > 0.01) {
      p.x += vx / len * spd * dt;
      p.y += vy / len * spd * dt;
    }

    p.x = clamp(p.x, p.r, world.w - p.r);
    p.y = clamp(p.y, p.r, world.h - p.r);
    p.hurtCD = Math.max(0, p.hurtCD - dt);
  }


  function updateCrateOpening(dt) {
    const p = state.player;
    const c = nearestCrate(p.x, p.y, p.openRange);
    if (!c) return;
    const dmg = p.openPower * state.buffs.open * dt;
    c.hp -= dmg;
    if (Math.random() < 0.22) addFx(c.x, c.y - 16, '開箱', '#9bceff');
    if (c.hp <= 0) {
      const reward = 1 + (Math.random() < 0.38 ? 1 : 0);
      for (let k = 0; k < reward; k++) {

        const role = ROLE_KEYS[Math.floor(Math.random() * ROLE_KEYS.length)];
        const cfg = ROLE_CFG[role];
        state.drops.push({ x: c.x + rand(-12, 12), y: c.y + rand(-12, 12), t: 'frag', role, v: 1, r: 9, color: cfg.color, icon: cfg.icon });
      }
      addFx(c.x, c.y - 18, '寶箱打開+' + reward, '#8ef2c3');
      const idx = state.crates.indexOf(c);
      if (idx >= 0) state.crates.splice(idx, 1);
    }
  }

  function updateSquad(dt) {
    const p = state.player;
    const n = state.squad.length;
    const baseR = 44 + n * 2;

    for (let i = 0; i < n; i++) {
      const u = state.squad[i];
      const cfg = ROLE_CFG[u.role];
      const ang = state.time * (0.86 + i * 0.07) + u.angleBase + i * (Math.PI * 2 / n);
      const ux = p.x + Math.cos(ang) * baseR;
      const uy = p.y + Math.sin(ang) * baseR;
      u.x = ux;
      u.y = uy;

      u.fireCD -= dt;
      if (u.fireCD <= 0) {
        const range = cfg.range + u.level * 16;
        const target = nearestEnemy(ux, uy, range);
        if (target) {
          const lvMul = 1 + (u.level - 1) * 0.46;
          const scaledDmg = (cfg.dmg + state.time * 0.03) * state.buffs.dmg * lvMul;

          if (cfg.melee) {
            const hitR = cfg.cleaveR + u.level * 4;
            const r2 = hitR * hitR;
            for (let j = state.enemies.length - 1; j >= 0; j--) {
              const e = state.enemies[j];
              const dx = e.x - ux;
              const dy = e.y - uy;
              if (dx * dx + dy * dy > r2) continue;
              e.hp -= scaledDmg;
              if (e.hp <= 0) killEnemyAt(j, e);
            }
            addFx(ux, uy - 8, '斬', cfg.color);
          } else {
            shoot(ux, uy, target.x, target.y, {
              role: u.role,
              r: cfg.bulletR + Math.min(2, u.level - 1),
              color: cfg.color,
              icon: cfg.icon,
              dmg: scaledDmg,
              pierce: cfg.pierce + state.buffs.pierce,
              speedMul: cfg.speedMul,
              aoe: cfg.aoe || 0
            });
          }

          const growth = 1 - (u.level - 1) * 0.14;
          const fireBase = (cfg.fireGap / state.buffs.rate) * Math.max(0.42, growth);
          u.fireCD = Math.max(0.16, fireBase + rand(-0.04, 0.04));
        }
      }
    }
  }



  function updateEnemies(dt) {
    const p = state.player;
    for (const e of state.enemies) {
      const dx = p.x - e.x;
      const dy = p.y - e.y;
      const len = Math.hypot(dx, dy) || 1;
      e.x += dx / len * e.spd * dt;
      e.y += dy / len * e.spd * dt;
      e.hitCD = Math.max(0, e.hitCD - dt);

      const touch = e.r + p.r;
      if (len < touch && p.hurtCD <= 0 && e.hitCD <= 0) {
        const dmg = 5 + state.time * 0.015;
        p.hp -= dmg;
        p.hurtCD = 0.35;
        e.hitCD = 0.45;
        addFx(p.x, p.y - 20, '-' + Math.round(dmg), '#ffb0b0');
      }
    }
  }

  function updateBullets(dt) {
    for (let i = state.bullets.length - 1; i >= 0; i--) {
      const b = state.bullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
      if (b.life <= 0 || b.x < -40 || b.y < -40 || b.x > world.w + 40 || b.y > world.h + 40) {
        state.bullets.splice(i, 1);
        continue;
      }

      for (let j = state.enemies.length - 1; j >= 0 && b.pierce > 0; j--) {
        const e = state.enemies[j];
        const dx = b.x - e.x;
        const dy = b.y - e.y;
        const hit = b.r + e.r;
        if (dx * dx + dy * dy <= hit * hit) {
          e.hp -= b.dmg;
          b.pierce--;
          if (b.aoe > 0) splashDamage(b.x, b.y, b.aoe, b.dmg * 0.75);
          if (e.hp <= 0) killEnemyAt(j, e);
        }
      }
    }
  }



  function updateDrops(dt) {
    const p = state.player;
    const magnet = 88 * state.buffs.magnet;
    const m2 = magnet * magnet;

    for (let i = state.drops.length - 1; i >= 0; i--) {
      const d = state.drops[i];
      const dx = p.x - d.x;
      const dy = p.y - d.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < m2) {
        const len = Math.hypot(dx, dy) || 1;
        const pull = 220;
        d.x += dx / len * pull * dt;
        d.y += dy / len * pull * dt;
      }
      if (d2 < (p.r + d.r + 8) * (p.r + d.r + 8)) {
        if (d.t === 'frag') {
          state.fragments[d.role] += d.v;
          const cfg = ROLE_CFG[d.role];
          addFx(p.x, p.y - 18, cfg.icon + ' +' + d.v, cfg.color);
        } else {
          state.score += d.v;
        }
        state.drops.splice(i, 1);
      }
    }

    for (const role of ROLE_KEYS) {
      let need = needFragmentsFor(role);
      while (state.fragments[role] >= need) {
        state.fragments[role] -= need;
        grantRoleUpgrade(role);
        need = needFragmentsFor(role);
      }
    }
  }



  function maybeLevelUp() {
    if (state.kills < state.nextLevelKills || state.pausePick) return;
    state.level++;
    state.nextLevelKills += Math.floor(18 + state.level * 7.5);
    openPick();
  }

  const allBuffs = [
    { key: 'dmg', name: '火力強化', desc: '隊員輸出 +25%', apply: () => state.buffs.dmg *= 1.25 },
    { key: 'rate', name: '急速射擊', desc: '隊員射速 +35%', apply: () => state.buffs.rate *= 1.35 },
    { key: 'move', name: '疾走', desc: '移動速度 +12%', apply: () => state.buffs.move *= 1.12 },
    { key: 'open', name: '拆箱專精', desc: '主角開箱效率 +28%', apply: () => state.buffs.open *= 1.28 },
    { key: 'pierce', name: '穿透彈', desc: '子彈穿透 +1', apply: () => state.buffs.pierce += 1 },
    { key: 'magnet', name: '磁吸', desc: '撿取範圍 +20%', apply: () => state.buffs.magnet *= 1.2 },
    { key: 'heal', name: '急救', desc: '立即回復 18 HP', apply: () => { state.player.hp = Math.min(state.player.maxHp, state.player.hp + 18); } },
  ];

  function pickRandomBuffs(n) {
    const arr = [...allBuffs];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr.slice(0, n);
  }

  function openPick() {
    state.pausePick = true;
    const opts = pickRandomBuffs(3);
    pickGridEl.innerHTML = '';
    for (const o of opts) {
      const b = document.createElement('button');
      b.className = 'optBtn';
      b.innerHTML = `<b>${o.name}</b><br><span style="opacity:.86">${o.desc}</span>`;
      b.addEventListener('click', () => {
        o.apply();
        addFx(state.player.x, state.player.y - 30, o.name, '#9bceff');
        state.pausePick = false;
        pickEl.style.display = 'none';
      });
      pickGridEl.appendChild(b);
    }
    pickEl.style.display = 'flex';
  }

  function updateFx(dt) {
    for (let i = state.fx.length - 1; i >= 0; i--) {
      state.fx[i].life -= dt;
      if (state.fx[i].life <= 0) state.fx.splice(i, 1);
    }
  }

  function drawGrid(camX, camY) {
    const step = 64;
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;

    const startX = -((camX - W / 2) % step);
    const startY = -((camY - H / 2) % step);

    for (let x = startX; x < W; x += step) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = startY; y < H; y += step) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  function drawCircle(x, y, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawJoystick() {
    const j = input.joy;
    if (!j.active) return;
    ctx.save();
    ctx.globalAlpha = 0.95;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(j.cx, j.cy, JOY.maxR, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    const knobR = 24;
    ctx.fillStyle = 'rgba(185, 224, 255, 0.32)';
    ctx.strokeStyle = 'rgba(185, 224, 255, 0.85)';
    ctx.beginPath();
    ctx.arc(j.cx + j.dx, j.cy + j.dy, knobR, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const camX = state.player.x;
    const camY = state.player.y;
    const toScreenX = (x) => x - camX + W / 2;
    const toScreenY = (y) => y - camY + H / 2;

    drawGrid(camX, camY);

    for (const c of state.crates) {
      const sx = toScreenX(c.x);
      const sy = toScreenY(c.y);
      ctx.fillStyle = '#6a5b42';
      ctx.fillRect(sx - c.r, sy - c.r, c.r * 2, c.r * 2);
      ctx.strokeStyle = '#b99768';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx - c.r, sy - c.r, c.r * 2, c.r * 2);
      ctx.fillStyle = '#ffe5b0';
      ctx.font = 'bold 13px -apple-system,Segoe UI,Roboto';
      ctx.textAlign = 'center';
      ctx.fillText('📦', sx, sy + 4);
      const hpw = (c.hp / c.maxHp) * c.r * 2;
      ctx.fillStyle = '#ffd58a';
      ctx.fillRect(sx - c.r, sy - c.r - 7, Math.max(0, hpw), 3);
    }


    for (const d of state.drops) {
      const sx = toScreenX(d.x);
      const sy = toScreenY(d.y);
      drawCircle(sx, sy, d.r, d.color || '#ffe078');
      ctx.fillStyle = '#0b1220';
      ctx.font = 'bold 11px -apple-system,Segoe UI,Roboto';
      ctx.textAlign = 'center';
      ctx.fillText(d.icon || '•', sx, sy + 4);
    }


    for (const b of state.bullets) {
      const sx = toScreenX(b.x);
      const sy = toScreenY(b.y);
      drawCircle(sx, sy, b.r, b.color || '#fff39b');
      ctx.fillStyle = 'rgba(10,16,26,0.6)';
      ctx.font = 'bold 10px -apple-system,Segoe UI,Roboto';
      ctx.textAlign = 'center';
      ctx.fillText(b.icon || '•', sx, sy + 3);
    }


    for (const e of state.enemies) {
      const sx = toScreenX(e.x);
      const sy = toScreenY(e.y);
      drawCircle(sx, sy, e.r, e.color);
      ctx.fillStyle = '#fff1f6';
      ctx.font = 'bold 12px -apple-system,Segoe UI,Roboto';
      ctx.textAlign = 'center';
      ctx.fillText(e.icon || '●', sx, sy + 4);
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(sx - e.r, sy - e.r - 6, e.r * 2, 3);
      ctx.fillStyle = '#ffd1d1';
      ctx.fillRect(sx - e.r, sy - e.r - 6, (e.hp / e.maxHp) * e.r * 2, 3);
    }


    for (const u of state.squad) {
      const cfg = ROLE_CFG[u.role];
      const sx = toScreenX(u.x);
      const sy = toScreenY(u.y);
      drawCircle(sx, sy, 8 + Math.min(3, u.level - 1), cfg.color);
      ctx.fillStyle = '#0c1528';
      ctx.font = 'bold 11px -apple-system,Segoe UI,Roboto';
      ctx.textAlign = 'center';
      ctx.fillText(cfg.icon, sx, sy + 4);
      ctx.fillStyle = '#e9f1ff';
      ctx.font = 'bold 9px -apple-system,Segoe UI,Roboto';
      ctx.fillText('L' + u.level, sx, sy - 10);
    }

    const p = state.player;
    const psx = toScreenX(p.x);
    const psy = toScreenY(p.y);
    drawCircle(psx, psy, p.r, p.hurtCD > 0 ? '#ff9fa8' : '#d7e7ff');
    ctx.fillStyle = '#1b2946';
    ctx.font = 'bold 12px -apple-system,Segoe UI,Roboto';
    ctx.textAlign = 'center';
    ctx.fillText('🔓', psx, psy + 4);

    const opening = nearestCrate(state.player.x, state.player.y, state.player.openRange);
    if (opening) {
      ctx.strokeStyle = 'rgba(140, 210, 255, 0.55)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(psx, psy);
      ctx.lineTo(toScreenX(opening.x), toScreenY(opening.y));
      ctx.stroke();
    }

    for (const f of state.fx) {

      const sx = toScreenX(f.x);
      const sy = toScreenY(f.y - (1 - f.life) * 32);
      ctx.fillStyle = f.c;
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = 'bold 13px -apple-system,Segoe UI,Roboto';
      ctx.textAlign = 'center';
      ctx.fillText(f.text, sx, sy);
      ctx.globalAlpha = 1;
    }

    drawJoystick();
  }


  function updateHud() {
    hpEl.textContent = 'HP ' + Math.max(0, Math.round(state.player.hp));
    hpEl.className = 'chip ' + (state.player.hp > 45 ? 'good' : (state.player.hp > 20 ? 'warn' : 'bad'));
    const teamPower = state.squad.reduce((s, u) => s + u.level, 0);
    squadEl.textContent = '隊伍 ' + state.squad.length + '人 / 力量' + teamPower;
    shardEl.textContent =
      '碎片 ⚔' + state.fragments.blade + '/' + needFragmentsFor('blade') +
      ' ✦' + state.fragments.gunner + '/' + needFragmentsFor('gunner') +
      ' ✹' + state.fragments.bomber + '/' + needFragmentsFor('bomber');
    killsEl.textContent = '擊殺 ' + state.kills;
    const t = Math.floor(state.time);
    const mm = String(Math.floor(t / 60)).padStart(2, '0');
    const ss = String(t % 60).padStart(2, '0');
    timerEl.textContent = mm + ':' + ss;
    nextLvEl.textContent = Math.max(0, state.nextLevelKills - state.kills);
  }





  function handleDownByLosingMember() {
    if (state.squad.length <= 1) {
      showGameOver();
      return;
    }

    let removeIdx = 0;
    let minLv = Infinity;
    for (let i = 0; i < state.squad.length; i++) {
      const lv = state.squad[i].level;
      if (lv < minLv) {
        minLv = lv;
        removeIdx = i;
      }
    }

    const lost = state.squad.splice(removeIdx, 1)[0];
    state.player.hp = Math.max(state.player.maxHp * 0.56, 36);
    state.player.hurtCD = 1.2;

    for (const role of ROLE_KEYS) {
      if (state.fragments[role] > 0) state.fragments[role] -= 1;
    }

    const cfg = ROLE_CFG[lost.role];
    addFx(state.player.x, state.player.y - 24, '失去 ' + cfg.icon + cfg.name, '#ffb0b0');
  }

  function showGameOver() {

    state.gameOver = true;
    goStatsEl.innerHTML =
      '生存時間：<b>' + timerEl.textContent + '</b><br>' +
      '擊殺：<b>' + state.kills + '</b><br>' +
      '最終隊伍：<b>' + state.squad.length + '</b><br>' +
      '分數：<b>' + state.score + '</b>';
    gameOverEl.style.display = 'flex';
  }

  restartBtn.addEventListener('click', () => {
    state = makeState();
    gameOverEl.style.display = 'none';
    pickEl.style.display = 'none';
  });

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    if (!state.gameOver && !state.pausePick) {
      state.time += dt;

      state.spawnEnemyCD -= dt;
      const spawnGap = Math.max(0.14, 0.45 - state.time * 0.0022);
      if (state.spawnEnemyCD <= 0) {
        spawnEnemy(false);
        if (Math.random() < 0.08) spawnEnemy(false);
        if (Math.random() < Math.min(0.24, state.time / 320)) spawnEnemy(true);
        state.spawnEnemyCD = spawnGap;
      }

      state.spawnCrateCD -= dt;
      if (state.spawnCrateCD <= 0) {
        spawnCrate();
        state.spawnCrateCD = 1.45;
      }


      updatePlayer(dt);
      updateCrateOpening(dt);
      updateSquad(dt);
      updateEnemies(dt);
      updateBullets(dt);
      updateDrops(dt);
      updateFx(dt);


      maybeLevelUp();

      if (state.player.hp <= 0) handleDownByLosingMember();
      if (state.time > 0.8 && hintEl.style.opacity !== '0') {
        const alpha = Math.max(0, 1 - state.time / 9);
        hintEl.style.opacity = String(alpha);
      }
    }

    draw();
    updateHud();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
